[package]
name = "ferro-server-api-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Ferro server API core: events, webhooks, event triggers, and search"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common", features = ["db"] }
ferro-core = { path = "../core", features = ["search", "wasm"] }
ferro-event-bus = { path = "../event-bus" }
ferro-server-security = { path = "../server-security" }
ferro-server-integrations = { path = "../server-integrations" }
ferro-server-security-middleware = { path = "../server-security-middleware" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
async-trait = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
hmac = "0.13"
sha2 = "0.11"
hex = "0.4"
rand = "0.9"
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls", "builder", "tokio1", "aws-lc-rs", "webpki-roots"] }
zeroize = { workspace = true, features = ["derive"] }

[dev-dependencies]
tokio = { workspace = true }
tempfile = "3"
http-body-util = "0.1"
tower = "0.5"
