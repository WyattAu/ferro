[package]
name = "ferro-server-content"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Content processing modules for the Ferro server (watermark, encryption, OCR)"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-server-security = { path = "../server-security" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
rusqlite = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp"] }
pdf = "0.9"
