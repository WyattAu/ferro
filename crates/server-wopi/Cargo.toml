[package]
name = "ferro-server-wopi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "WOPI (Web Application Open Platform Interface) handlers for Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tracing = "0.1"
chrono = "0.4"
base64 = "0.22"
hmac = "0.13"
sha2 = "0.11"
hex = "0.4"
async-trait = "0.1"
bytes = "1"

[dev-dependencies]
tower = { version = "0.5" }
http-body-util = "0.1"
