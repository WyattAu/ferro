[package]
name = "ferro-server-infra"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Infrastructure modules (federation, Redis locks, PG state, metadata replication) for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[features]
default = []
pg = ["dep:sqlx", "sqlx/postgres", "sqlx/chrono", "dep:ferro-server-sharing"]
redis = ["dep:redis"]

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-circuit-breaker = { path = "../circuit-breaker" }
ferro-server-activitypub = { path = "../server-activitypub" }
ferro-server-security = { path = "../server-security" }
ferro-server-api-core = { path = "../server-api-core" }
ferro-server-sharing = { path = "../server-sharing", optional = true }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
dashmap = "6"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
zeroize = { workspace = true, features = ["derive"] }
http-body-util = "0.1"
async-trait = "0.1"
anyhow = "1"
sqlx = { version = "0.8.1", features = ["runtime-tokio", "chrono"], optional = true }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"], optional = true }
