[package]
name = "ferro-server-user-mgmt"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "User management, guest accounts, device management, and TOTP API for Ferro"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-auth = { path = "../auth" }
ferro-server-security = { path = "../server-security" }
ferro-server-integrations = { path = "../server-integrations" }
ferro-server-sharing = { path = "../server-sharing" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
rusqlite = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
rand = { workspace = true }
tokio-util = { version = "0.7", features = ["io", "rt"] }
