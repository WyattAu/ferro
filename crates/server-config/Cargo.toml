[package]
name = "ferro-server-config"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Configuration types and CLI utilities for Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[features]
default = []
pg = []
redis = []
ldap = []

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
toml = "0.8"
serde = { workspace = true }
serde_json = "1"
url = "2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
anyhow = "1"

[dev-dependencies]
tempfile = "3"
