[package]
name = "ferro-server"
version = "0.1.0"
edition = "2024"

[features]
default = []
s3 = ["ferro-core/s3", "object_store/aws"]
gcs = ["ferro-core/gcs", "object_store/gcp"]
azure = ["ferro-core/azure", "object_store/azure"]
pg = ["ferro-core/pg", "sqlx", "sqlx/postgres", "sqlx/chrono"]
redis = ["dep:redis"]
ldap = ["dep:ldap3"]

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-core = { path = "../core" }
tokio = { workspace = true }
axum = { workspace = true, features = ["macros", "multipart"] }
serde = { workspace = true }
serde_json = "1"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "fs", "compression-gzip"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1"
chrono = "0.4"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
clap = { version = "4", features = ["derive", "env"] }
dashmap = "6"
anyhow = "1"
toml = "0.8"
jsonwebtoken = "9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
cedar-policy = "4"
base64 = "0.22"
quick-xml = { version = "0.37", features = ["serialize"] }
async-trait = "0.1"
mime_guess = "2"
tempfile = "3"
rand = "0.8"
sha2 = "0.10"
hmac = "0.12"
subtle = "2"
hex = "0.4"
object_store = "0.11"
futures = "0.3"
url = "2"
sqlx = { version = "0.8", features = ["runtime-tokio", "chrono"], optional = true }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"], optional = true }
ldap3 = { version = "0.12", optional = true }

[dev-dependencies]
http-body-util = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { workspace = true }
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "latency"
harness = false

[[bench]]
name = "webdav_ops"
harness = false

[[bench]]
name = "wasm_dispatch"
harness = false

[[bench]]
name = "storage_ops"
harness = false
