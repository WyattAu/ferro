[package]
name = "ferro-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Ferro server with WebDAV, CalDAV, and CardDAV support"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[features]
default = []
s3 = ["ferro-core/s3", "object_store/aws"]
gcs = ["ferro-core/gcs", "object_store/gcp"]
azure = ["ferro-core/azure", "object_store/azure"]
pg = ["ferro-core/postgres", "sqlx", "sqlx/postgres", "sqlx/chrono"]
redis = ["dep:redis"]
ldap = ["dep:ldap3"]

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-webdav-handler = { path = "../webdav-handler" }
ferro-server-webrtc = { path = "../server-webrtc" }
ferro-auth = { path = "../auth" }
ferro-server-activitypub = { path = "../server-activitypub" }
ferro-core = { path = "../core", features = ["sqlite", "search", "wasm", "object_store"] }
ferro-dav = { path = "../dav", features = ["handlers"] }
tokio = { workspace = true }
axum = { workspace = true, features = ["macros", "multipart", "ws"] }
serde = { workspace = true }
serde_json = "1"
tower = { version = "0.5", features = ["limit"] }
tower-http = { version = "0.6", features = ["cors", "trace", "fs", "compression-gzip"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1"
chrono = "0.4"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
clap = { version = "4", features = ["derive", "env"] }
dashmap = "6"
anyhow = "1"
toml = "0.8"
jsonwebtoken = "9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
cedar-policy = "4"
base64 = "0.22"
quick-xml = { version = "0.37", features = ["serialize"] }
async-trait = "0.1"
mime_guess = "2"
tempfile = "3"
rand = "0.9"
sha2 = "0.11"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp"] }
hmac = "0.13"
bcrypt = "0.17"
subtle = "2"
hex = "0.4"
object_store = "0.11"
futures = "0.3"
tokio-util = { version = "0.7", features = ["io"] }
url = "2"
sqlx = { version = "0.8.1", features = ["runtime-tokio", "chrono"], optional = true }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"], optional = true }
ldap3 = { version = "0.12", optional = true }
pdf = "0.9"
age = { version = "0.11", features = ["armor"] }
rcgen = { version = "0.13", features = ["x509-parser"] }
async-graphql = "7"
rusqlite = { version = "0.32", features = ["bundled"] }
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "8", features = ["axum"] }

[dev-dependencies]
http-body-util = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { workspace = true }
criterion = { version = "0.8", features = ["async_tokio"] }

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "latency"
harness = false

[[bench]]
name = "webdav_ops"
harness = false

[[bench]]
name = "wasm_dispatch"
harness = false

[[bench]]
name = "storage_ops"
harness = false
