[package]
name = "ferro-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Ferro server with WebDAV, CalDAV, and CardDAV support"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[features]
default = []
s3 = ["ferro-core/s3", "object_store/aws"]
gcs = ["ferro-core/gcs", "object_store/gcp"]
azure = ["ferro-core/azure", "object_store/azure"]
pg = ["ferro-core/postgres", "sqlx", "sqlx/postgres", "sqlx/chrono", "ferro-server-config/pg"]
redis = ["dep:redis", "ferro-health/redis", "ferro-server-infra/redis", "ferro-server-config/redis"]
ldap = ["dep:ldap3", "ferro-server-config/ldap"]
webauthn = []
otel = ["dep:opentelemetry", "dep:opentelemetry-otlp", "dep:opentelemetry_sdk", "dep:tracing-opentelemetry"]

[dependencies]
common = { package = "ferro-common", path = "../common", features = ["db"] }
ferro-webdav-handler = { path = "../webdav-handler" }
ferro-server-webrtc = { path = "../server-webrtc" }
ferro-auth = { path = "../auth" }
ferro-server-activitypub = { path = "../server-activitypub" }
ferro-server-wopi = { path = "../server-wopi" }
ferro-server-versioning = { path = "../server-versioning" }
ferro-graphql = { path = "../graphql" }
ferro-core = { path = "../core", features = ["sqlite", "search", "wasm", "object_store"] }
ferro-dav = { path = "../dav", features = ["handlers"] }
tokio = { workspace = true }
axum = { workspace = true, features = ["macros", "multipart", "ws"] }
serde = { workspace = true }
serde_json = "1"
tower = { version = "0.5", features = ["limit"] }
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
bytes = "1"
chrono = "0.4"
libc = "0.2"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
dashmap = "6"
anyhow = "1"
toml = "0.8"
jsonwebtoken = "9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
base64 = "0.22"
async-trait = "0.1"
tempfile = "3"
rand = "0.9"
sha2 = "0.11"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp"] }
hmac = "0.13"
subtle = "2"
hex = "0.4"
object_store = "0.11"
futures = "0.3"
http-body-util = "0.1"
tokio-util = { version = "0.7", features = ["io", "rt"] }
url = "2"
sqlx = { version = "0.8.1", features = ["runtime-tokio", "chrono"], optional = true }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"], optional = true }
ldap3 = { version = "0.12", optional = true }
pdf = "0.9"
rusqlite = { version = "0.32", features = ["bundled", "trace"] }
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "8", features = ["axum", "vendored"] }
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls", "builder", "tokio1", "aws-lc-rs", "webpki-roots"] }
opentelemetry = { version = "0.29", optional = true }
opentelemetry-otlp = { version = "0.29", optional = true, features = ["grpc-tonic", "trace"] }
opentelemetry_sdk = { version = "0.29", optional = true, features = ["rt-tokio", "rt-tokio-current-thread"] }
tracing-opentelemetry = { version = "0.30", optional = true }
ferro-rate-limiter = { path = "../rate-limiter" }
ferro-cache = { path = "../cache" }
ferro-health = { path = "../health" }
ferro-multi-tenant = { path = "../multi-tenant" }
ferro-mount-nfs = { path = "../mount-nfs" }
ferro-event-bus = { path = "../event-bus" }
ferro-ai = { path = "../ai" }
ferro-crdt = { path = "../crdt" }
ferro-distributed = { path = "../distributed" }
ferro-offline = { path = "../offline" }
ferro-server-security = { path = "../server-security" }
ferro-server-security-middleware = { path = "../server-security-middleware" }
ferro-server-content = { path = "../server-content" }
ferro-server-compliance = { path = "../server-compliance" }
ferro-server-automation = { path = "../server-automation" }
ferro-server-integrations = { path = "../server-integrations" }
ferro-server-plugins = { path = "../server-plugins" }
ferro-server-admin-api = { path = "../server-admin-api" }
ferro-circuit-breaker = { path = "../circuit-breaker" }
ferro-server-resilience = { path = "../server-resilience" }
ferro-server-api-core = { path = "../server-api-core" }
zip = "2"
ferro-selective-sync = { path = "../selective-sync" }
ferro-server-sharing = { path = "../server-sharing" }
ferro-server-user-mgmt = { path = "../server-user-mgmt" }
ferro-server-collaboration = { path = "../server-collaboration" }
ferro-server-storage-ops = { path = "../server-storage-ops" }
ferro-server-api = { path = "../server-api" }
ferro-server-webdav-core = { path = "../server-webdav-core" }
ferro-server-productivity = { path = "../server-productivity" }
ferro-server-infra = { path = "../server-infra" }
ferro-server-config = { path = "../server-config" }
ferro-server-state = { path = "../server-state" }
ferro-server-health = { path = "../server-health" }
ferro-server-sync-handlers = { path = "../server-sync-handlers" }
ferro-server-federation = { path = "../server-federation" }
ferro-server-routes = { path = "../server-routes" }
ferro-server-slo = { path = "../server-slo" }
ferro-server-fips = { path = "../server-fips" }
zeroize = { workspace = true, features = ["derive"] }
qrcode = "0.14"

[dev-dependencies]
http-body-util = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { workspace = true }
tokio-tungstenite = "0.24"
criterion = { version = "0.8", features = ["async_tokio"] }
proptest = "1"
ferro-event-bus = { path = "../event-bus" }

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "latency"
harness = false

[[bench]]
name = "webdav_ops"
harness = false

[[bench]]
name = "wasm_dispatch"
harness = false

[[bench]]
name = "storage_ops"
harness = false
