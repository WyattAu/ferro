[package]
name = "ferro-server-router"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Generic Axum router builder over ServerState trait"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
axum = { workspace = true }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "compression-gzip"] }
ferro-server-state = { path = "../server-state" }
ferro-server-health = { path = "../health", package = "ferro-health" }
http = "1"
hyper = "1"
tokio = { workspace = true }
serde_json = { workspace = true }
