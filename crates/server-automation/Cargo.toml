[package]
name = "ferro-server-automation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Ferro server automation, workflows, webhooks, and policies"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-core = { path = "../core", features = ["wasm"] }
ferro-auth = { path = "../auth" }
axum = { workspace = true, features = ["macros"] }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
rusqlite = { version = "0.32", features = ["bundled"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tracing = "0.1"
hmac = "0.13"
sha2 = "0.11"
hex = "0.4"
rand = "0.9"
url = "2"
base64 = "0.22"
pdf = "0.9"
tokio-util = { version = "0.7", features = ["rt"] }
utoipa = { version = "5", features = ["axum_extras"] }
zeroize = { workspace = true, features = ["derive"] }

[dev-dependencies]
tokio = { workspace = true }
tempfile = "3"
