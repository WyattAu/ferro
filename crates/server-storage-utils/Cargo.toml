[package]
name = "ferro-server-storage-utils"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Storage utility modules (thumbnails, snapshots, storage health) for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-core = { path = "../core", features = ["sqlite", "search"] }
ferro-server-security = { path = "../server-security" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
bytes = "1"
sha2 = "0.11"
hex = "0.4"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp"] }
pdf = "0.9"
dashmap = "6"
lru = "0.16"
tempfile = "3"
