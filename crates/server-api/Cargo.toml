[package]
name = "ferro-server-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Generic API handler implementations for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
axum = { workspace = true }
common = { package = "ferro-common", path = "../common" }
ferro-server-state = { path = "../server-state" }
ferro-server-security-middleware = { path = "../server-security-middleware" }
ferro-server-security = { path = "../server-security" }
ferro-server-storage-ops = { path = "../server-storage-ops" }
ferro-auth = { path = "../auth" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
hyper = { version = "1" }
http = { version = "1" }
bytes = { workspace = true }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
rand = "0.9"
sha2 = "0.11"
url = "2"
tokio-util = { version = "0.7", features = ["io"] }
utoipa = { version = "5", features = ["axum_extras"] }
chrono = "0.4"
