[package]
name = "ferro-server-sharing"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Sharing, favorites, tags, comments, guests, and federation sync for Ferro"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common", features = ["db"] }
ferro-core = { path = "../core", features = ["sqlite"] }
ferro-auth = { path = "../auth" }
ferro-server-activitypub = { path = "../server-activitypub" }
tokio = { workspace = true }
axum = { workspace = true, features = ["macros", "multipart"] }
serde = { workspace = true }
serde_json = "1"
chrono = "0.4"
rusqlite = { version = "0.32", features = ["bundled"] }
dashmap = "6"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.11"
hex = "0.4"
subtle = "2"
tracing = "0.1"
bytes = "1"
rand = "0.9"
tokio-util = { version = "0.7", features = ["io", "rt"] }
futures = "0.3"

[dev-dependencies]
tempfile = "3"
http-body-util = "0.1"
