[package]
name = "ferro-server-plugins"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Plugin permissions, marketplace, and WASM worker modules for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
ferro-core = { path = "../core", features = ["wasm"] }
axum = { workspace = true, features = ["multipart"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
dashmap = "6"
uuid = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tempfile = "3"
http-body-util = "0.1"
tower = { version = "0.5" }
