<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferro</title>
    <style>
        /* === Reset & Base === */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        /* === CSS Variables (Light) === */
        :root {
            --bg: #ffffff;
            --bg-secondary: #f6f6f6;
            --bg-tertiary: #ececec;
            --bg-hover: #e8e8e8;
            --bg-selected: #d4e4ff;
            --bg-sidebar: #f2f2f2;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #d8d8d8;
            --accent: #0066d6;
            --accent-hover: #0052a3;
            --accent-light: #e8f0fe;
            --danger: #cc3333;
            --danger-hover: #b52a2a;
            --success: #1a8c1a;
            --surface: #f6f6f6;
            --text-primary: #1a1a1a;
            --toolbar-h: 44px;
            --status-h: 28px;
            --sidebar-w: 200px;
            --radius: 4px;
        }

        /* === Dark Theme === */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --bg-secondary: #252526;
                --bg-tertiary: #2d2d2d;
                --bg-hover: #2a2d2e;
                --bg-selected: #094771;
                --bg-sidebar: #1f1f1f;
                --text: #cccccc;
                --text-secondary: #858585;
                --text-tertiary: #5a5a5a;
                --border: #3e3e3e;
                --accent: #0078d4;
                --accent-hover: #1a8adf;
                --accent-light: #094771;
                --danger: #f44747;
                --danger-hover: #ff6b6b;
                --success: #89d185;
                --surface: #252526;
                --text-primary: #cccccc;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        input { font-family: inherit; font-size: inherit; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; outline: none; }
        input:focus { border-color: var(--accent); }

        .hidden { display: none !important; }

        /* === Connect Dialog === */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .dialog {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px 32px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .dialog h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
        .form-group input { width: 100%; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .error-text { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 18px; }
        .btn {
            padding: 6px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover { background: var(--bg-hover); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-danger { color: var(--danger); }
        .btn-danger:hover { background: var(--bg-hover); }

        /* === Layout === */
        #app { display: flex; flex-direction: column; height: 100vh; }

        /* === Toolbar === */
        .toolbar {
            display: flex; align-items: center; justify-content: space-between;
            height: var(--toolbar-h); padding: 0 8px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
            gap: 4px;
        }
        .toolbar-group { display: flex; align-items: center; gap: 2px; }
        .toolbar-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius);
            color: var(--text-secondary);
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .toolbar-btn:hover { background: var(--bg-hover); color: var(--text); }
        .toolbar-btn:active { background: var(--bg-tertiary); }
        .toolbar-btn:disabled { opacity: 0.4; cursor: default; }
        .toolbar-btn:disabled:hover { background: none; color: var(--text-secondary); }
        .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

        .path-bar {
            flex: 1; min-width: 0;
            display: flex; align-items: center;
            padding: 0 8px; height: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .breadcrumbs {
            display: flex; align-items: center; gap: 2px;
            white-space: nowrap; overflow-x: auto;
            scrollbar-width: none;
        }
        .breadcrumbs::-webkit-scrollbar { display: none; }
        .breadcrumb {
            padding: 2px 4px;
            border-radius: 3px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }
        .breadcrumb:hover { background: var(--bg-hover); color: var(--text); }
        .breadcrumb.active { color: var(--text); font-weight: 500; }
        .breadcrumb-sep { color: var(--text-tertiary); flex-shrink: 0; user-select: none; }

        /* === Content === */
        .content { display: flex; flex: 1; overflow: hidden; }

        /* === Sidebar === */
        .sidebar {
            width: var(--sidebar-w); min-width: var(--sidebar-w);
            border-right: 1px solid var(--border);
            background: var(--bg-sidebar);
            overflow-y: auto;
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 10px 12px 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
        }
        .tree { flex: 1; overflow-y: auto; padding-bottom: 12px; }
        .tree-item {
            display: flex; align-items: center; gap: 4px;
            padding: 3px 8px 3px 0;
            cursor: pointer;
            color: var(--text-secondary);
            transition: background 0.1s;
            user-select: none;
        }
        .tree-item:hover { background: var(--bg-hover); }
        .tree-item.active { background: var(--bg-selected); color: var(--text); }
        .tree-toggle { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .tree-icon { display: flex; align-items: center; flex-shrink: 0; }
        .tree-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }

        /* === File List === */
        .file-list-container {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; min-width: 0;
            position: relative;
        }
        .file-list-header {
            display: flex; align-items: center;
            height: 30px; padding: 0 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .col-name { flex: 1; min-width: 0; }
        .col-size { width: 90px; text-align: right; flex-shrink: 0; }
        .col-modified { width: 180px; text-align: right; flex-shrink: 0; }

        .file-list {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 4px 0;
        }
        .file-list.drag-over::after {
            content: "Drop files to upload";
            position: absolute; inset: 32px 8px 8px 8px;
            background: var(--accent-light);
            border: 2px dashed var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 500; color: var(--accent);
            pointer-events: none;
            z-index: 5;
        }
        .file-entry {
            display: flex; align-items: center;
            padding: 4px 12px;
            cursor: default;
            user-select: none;
            transition: background 0.08s;
        }
        .file-entry:hover { background: var(--bg-hover); }
        .file-entry.selected { background: var(--bg-selected); }
        .file-entry .file-icon { display: flex; align-items: center; margin-right: 8px; flex-shrink: 0; color: var(--text-tertiary); }
        .file-entry .file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-entry .file-size { width: 90px; text-align: right; color: var(--text-secondary); flex-shrink: 0; font-variant-numeric: tabular-nums; }
        .file-entry .file-modified { width: 180px; text-align: right; color: var(--text-secondary); flex-shrink: 0; }

        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; color: var(--text-tertiary);
            gap: 8px;
        }
        .empty-state svg { opacity: 0.4; }
        .empty-state span { font-size: 13px; }

        .loading {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-tertiary);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* === Status Bar === */
        .status-bar {
            display: flex; align-items: center;
            height: var(--status-h); padding: 0 12px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            font-size: 12px;
            color: var(--text-secondary);
            gap: 16px;
            flex-shrink: 0;
        }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.connected { background: var(--success); }
        .status-dot.disconnected { background: var(--danger); }
        .status-bar .spacer { flex: 1; }

        /* === Context Menu === */
        .context-menu {
            position: fixed;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 160px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            z-index: 2000;
        }
        .context-item {
            padding: 6px 16px;
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: background 0.1s;
        }
        .context-item:hover { background: var(--bg-hover); }
        .context-item.danger { color: var(--danger); }
        .context-item.danger:hover { background: rgba(204, 51, 51, 0.08); }
        .context-sep { height: 1px; background: var(--border); margin: 4px 0; }

        /* === Scrollbars === */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* Debug panel */
        .debug-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 200px; max-height: 50vh; z-index: 10000;
            background: var(--bg); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; font-family: monospace;
            font-size: 12px; color: var(--text-secondary);
            resize: vertical;
        }
        .debug-panel.hidden { display: none; }
        .debug-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 8px; border-bottom: 1px solid var(--border);
            background: var(--surface); font-weight: 600; color: var(--text-primary);
            flex-shrink: 0;
        }
        .debug-header button {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 2px 8px; border-radius: 3px;
            cursor: pointer; font-size: 11px; margin-left: 4px;
        }
        .debug-header button:hover { background: var(--border); }
        .debug-log-content {
            flex: 1; overflow-y: auto; padding: 4px 8px;
            white-space: pre-wrap; word-break: break-all;
        }
        .debug-line { padding: 1px 0; }
        .debug-info { color: var(--text-secondary); }
        .debug-error { color: #e74c3c; }
        .debug-warn { color: #f39c12; }

        /* === Hamburger Button === */
        .hamburger {
            width: 32px; height: 32px;
            display: none; align-items: center; justify-content: center;
            border-radius: var(--radius);
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .hamburger:hover { background: var(--bg-hover); color: var(--text); }

        /* === Mobile Navigation Bar === */
        .mobile-nav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 56px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            align-items: center; justify-content: space-around;
            z-index: 500;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .nav-btn {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2px; padding: 4px 0;
            min-width: 56px; min-height: 44px;
            color: var(--text-secondary);
            font-size: 10px;
            border-radius: var(--radius);
            transition: color 0.15s;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 22px; height: 22px; }

        /* === Swipe Action Buttons === */
        .file-entry-swipe-actions {
            position: absolute; right: 0; top: 0; bottom: 0;
            display: flex; align-items: stretch;
            transform: translateX(100%);
            transition: transform 0.2s ease;
        }
        .file-entry-swipe-actions.visible {
            transform: translateX(0);
        }
        .swipe-btn {
            display: flex; align-items: center; justify-content: center;
            width: 64px; color: #fff; font-size: 12px; font-weight: 500;
        }
        .swipe-btn-share { background: var(--accent); }
        .swipe-btn-delete { background: var(--danger); }

        .file-entry-wrapper {
            position: relative; overflow: hidden;
        }
        .file-entry-wrapper .file-entry {
            position: relative;
            transition: transform 0.2s ease;
        }

        /* === View Panels (Settings, Recent, Favorites) === */
        .view-panel {
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
        }
        .view-panel.hidden { display: none; }
        .view-panel-content {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        .view-panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .view-panel .form-group { margin-bottom: 14px; }
        .view-panel .form-group label {
            display: block; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); margin-bottom: 4px;
        }
        .view-panel .form-group input,
        .view-panel .form-group select {
            width: 100%; padding: 6px 10px;
            border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--bg); color: var(--text); font-size: 13px;
        }
        .view-panel .form-group input[type="range"] {
            padding: 0; border: none; background: none;
        }
        .view-panel .dialog-actions {
            display: flex; gap: 8px; margin-top: 20px;
        }
        .view-panel .file-list .file-entry {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .view-panel .empty-state {
            color: var(--text-tertiary); font-size: 13px;
            padding: 20px 0; text-align: center;
        }
        .fav-remove {
            margin-left: auto; padding: 4px 8px; color: var(--danger);
            cursor: pointer; font-size: 12px;
        }
        .fav-remove:hover { background: var(--bg-hover); border-radius: var(--radius); }

        /* === Pull to Refresh Indicator === */
        .pull-indicator {
            position: absolute; top: -40px; left: 50%;
            transform: translateX(-50%);
            height: 40px; display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
            transition: top 0.2s ease;
            z-index: 10;
        }
        .pull-indicator.pulling { top: 0; }
        .pull-indicator.refreshing .spinner { display: block; }

        /* === Mobile Responsive === */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.open {
                display: flex; position: fixed; z-index: 100;
                width: 100%; height: 100%;
                top: 0; left: 0;
                background: var(--bg-sidebar);
            }
            .hamburger { display: flex; }
            .content { flex-direction: column; }
            .file-list-container { margin-left: 0 !important; }
            .toolbar button, .toolbar .btn { min-width: 44px; min-height: 44px; }
            .file-list .file-entry { min-height: 48px; }
            .dialog { width: 95vw; max-height: 90vh; }
            .col-modified { display: none; }
            .file-entry .file-modified { display: none; }
            .mobile-nav { display: flex; }
            .status-bar { padding-bottom: 56px; }
            .file-list-container { padding-bottom: 56px; }
        }

        @media (min-width: 769px) {
            .mobile-nav { display: none !important; }
            .hamburger { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Connect Dialog -->
        <div id="connect-overlay" class="overlay">
            <div class="dialog">
                <h2>Connect to Ferro Server</h2>
                <div class="form-group">
                    <label for="connect-url">Server URL</label>
                    <input type="text" id="connect-url" placeholder="http://localhost:8080" spellcheck="false">
                </div>
                <div class="form-group">
                    <label for="connect-token">Auth Token</label>
                    <input type="password" id="connect-token" placeholder="Bearer token">
                </div>
                <div class="dialog-actions">
                    <button id="connect-btn" class="btn btn-primary">Connect</button>
                </div>
                <div id="connect-error" class="error-text"></div>
            </div>
        </div>

        <!-- Rename Dialog -->
        <div id="rename-overlay" class="overlay hidden">
            <div class="dialog">
                <h2>Rename</h2>
                <div class="form-group">
                    <label for="rename-input">New Name</label>
                    <input type="text" id="rename-input">
                </div>
                <div class="dialog-actions">
                    <button id="rename-cancel" class="btn">Cancel</button>
                    <button id="rename-ok" class="btn btn-primary">Rename</button>
                </div>
            </div>
        </div>

        <!-- New Folder Dialog -->
        <div id="mkdir-overlay" class="overlay hidden">
            <div class="dialog">
                <h2>New Folder</h2>
                <div class="form-group">
                    <label for="mkdir-input">Folder Name</label>
                    <input type="text" id="mkdir-input" placeholder="untitled folder">
                </div>
                <div class="dialog-actions">
                    <button id="mkdir-cancel" class="btn">Cancel</button>
                    <button id="mkdir-ok" class="btn btn-primary">Create</button>
                </div>
            </div>
        </div>

        <!-- Confirm Delete Dialog -->
        <div id="delete-overlay" class="overlay hidden">
            <div class="dialog">
                <h2>Confirm Delete</h2>
                <p id="delete-message" style="margin-bottom: 4px; color: var(--text-secondary);"></p>
                <div class="dialog-actions">
                    <button id="delete-cancel" class="btn">Cancel</button>
                    <button id="delete-ok" class="btn btn-danger">Delete</button>
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div id="main" class="hidden">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <button class="hamburger" id="btn-hamburger" title="Menu">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <button class="toolbar-btn" id="btn-back" title="Back">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button class="toolbar-btn" id="btn-forward" title="Forward">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                    <button class="toolbar-btn" id="btn-up" title="Up">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    </button>
                    <button class="toolbar-btn" id="btn-home" title="Home">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </button>
                    <button class="toolbar-btn" id="btn-refresh" title="Refresh">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    <div class="path-bar">
                        <div id="breadcrumbs" class="breadcrumbs"></div>
                </div>

                <!-- Settings View -->
                <div id="settings-view" class="view-panel hidden">
                    <div class="view-panel-content">
                        <h3 class="view-panel-title">Settings</h3>
                        <div class="form-group">
                            <label>Server URL</label>
                            <input type="text" id="settings-server-url" placeholder="http://localhost:8080" spellcheck="false">
                        </div>
                        <div class="form-group">
                            <label>Auth Token</label>
                            <input type="password" id="settings-auth-token" placeholder="Bearer token">
                        </div>
                        <div class="form-group">
                            <label>Mount Point</label>

                    <button class="toolbar-btn" id="btn-disconnect" title="Disconnect">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>

            <!-- Content -->
            <div class="content">

        <!-- Debug Log Panel (toggled via Ctrl+Shift+D) -->

        <!-- Mobile Navigation -->
        <div class="mobile-nav" id="mobileNav">

            </button>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Favorites
            </button>
            <button class="nav-btn" data-view="settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Settings
            </button>
        </div>
    </div>

    <script>
        /* === Diagnostics === */
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[ferro] DOMContentLoaded check:', document.readyState);
            console.log('[ferro] __TAURI__ exists:', typeof window.__TAURI__ !== 'undefined');
            console.log('[ferro] __TAURI_INTERNALS__ exists:', typeof window.__TAURI_INTERNALS__ !== 'undefined');
            if (typeof window.__TAURI__ !== 'undefined') {
                console.log('[ferro] __TAURI__ keys:', Object.keys(window.__TAURI__));
                console.log('[ferro] __TAURI__.core keys:', Object.keys(window.__TAURI__.core || {}));
            }
            console.log('[ferro] DOMContentLoaded fired');
        });

        /* === Tauri API === */
        if (typeof window.__TAURI__ === 'undefined') {
            document.getElementById('connect-error').textContent = 'ERROR: Tauri API not loaded. withGlobalTauri may not be configured.';
            document.getElementById('connect-error').style.display = 'block';
            console.error('[ferro] window.__TAURI__ is undefined - Tauri IPC not available');
        }
        const { invoke } = window.__TAURI__?.core || { invoke: () => { throw new Error('Tauri API not available'); } };

        /* === State === */
        let serverUrl = '';
        let authToken = '';
        let currentPath = '/';
        let currentEntries = [];
        let selectedEntry = null;
        let pathHistory = ['/'];
        let historyIndex = 0;
        let treeData = {};
        let expandedPaths = new Set(['/']);
        let contextTarget = null;

        /* === SVG Icons === */
        const ICO = {
            folder: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
            file: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
            chevronR: '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>',
            chevronD: '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>',
            empty: '<svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
        };

        /* === Utilities === */
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatSize(bytes) {
            if (bytes === 0) return '--';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            const val = bytes / Math.pow(1024, i);
            return val.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
        }

        function formatDate(dateStr) {
            if (!dateStr) return '--';
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch { return dateStr; }
        }

        function normalizePath(p) {
            if (!p.startsWith('/')) p = '/' + p;
            return p.replace(/\/+/g, '/').replace(/\/$/, '') || '/';
        }

        function joinPath(base, name) {
            if (base === '/') return '/' + name;
            return base + '/' + name;
        }

        function parentPath(p) {
            if (p === '/') return '/';
            const idx = p.lastIndexOf('/');
            return idx <= 0 ? '/' : p.substring(0, idx);
        }

        /* === DOM References === */
        const $id = id => document.getElementById(id);
        const connectOverlay = $id('connect-overlay');
        const connectUrl = $id('connect-url');
        const connectToken = $id('connect-token');
        const connectBtn = $id('connect-btn');
        const connectError = $id('connect-error');
        const mainEl = $id('main');
        const breadcrumbs = $id('breadcrumbs');
        const treeEl = $id('tree');
        const fileList = $id('file-list');
        const fileListContainer = $id('file-list-container');
        const contextMenu = $id('context-menu');
        const renameOverlay = $id('rename-overlay');
        const renameInput = $id('rename-input');
        const mkdirOverlay = $id('mkdir-overlay');
        const mkdirInput = $id('mkdir-input');
        const deleteOverlay = $id('delete-overlay');
        const deleteMessage = $id('delete-message');

        /* === Connection === */
        async function connect() {
            const url = connectUrl.value.trim().replace(/\/+$/, '');
            const token = connectToken.value.trim();
            if (!url) { connectError.textContent = 'Server URL is required'; return; }

            connectBtn.disabled = true;
            connectBtn.textContent = 'Connecting...';
            connectError.textContent = '';

            try {
                const info = await invoke('test_connection', { url, token });
                serverUrl = url;
                authToken = token;
                localStorage.setItem('ferro_connection', JSON.stringify({ url: serverUrl, token: authToken }));
                connectOverlay.classList.add('hidden');
                mainEl.classList.remove('hidden');
                await navigate('/');
                await loadTree();
                updateConnectionStatus(true, info.serverName);
            } catch (err) {
                connectError.textContent = String(err);
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect';
            }
        }

        function disconnect() {
            serverUrl = '';
            authToken = '';
            currentPath = '/';
            currentEntries = [];
            selectedEntry = null;
            treeData = {};
            localStorage.removeItem('ferro_connection');
            mainEl.classList.add('hidden');
            connectOverlay.classList.remove('hidden');
            connectError.textContent = '';
            connectUrl.value = '';
            connectToken.value = '';
        }

        function updateConnectionStatus(connected, name) {
            const dot = $id('status-dot');
            const text = $id('status-connection');
            dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
            text.textContent = connected ? (name || 'Connected') : 'Disconnected';
        }

        /* === Navigation === */
        async function navigate(path, addToHistory) {
            if (addToHistory !== false) {
                pathHistory = pathHistory.slice(0, historyIndex + 1);
                pathHistory.push(path);
                historyIndex = pathHistory.length - 1;
            }
            currentPath = normalizePath(path);
            selectedEntry = null;
            updateToolbar();
            await loadDirectory();
        }

        async function loadDirectory() {
            fileList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const json = await invoke('list_directory', { url: serverUrl, token: authToken, path: currentPath });
                currentEntries = JSON.parse(json);
                renderFileList();
                renderSidebar();
                updateStatus();
            } catch (err) {
                fileList.innerHTML = `<div class="empty-state"><span>Error: ${escapeHtml(String(err))}</span></div>`;
                currentEntries = [];
            }
        }

        async function loadTree() {
            try {
                const json = await invoke('list_directory', { url: serverUrl, token: authToken, path: '/', depth: '1' });
                const entries = JSON.parse(json);
                treeData = {};
                for (const entry of entries) {
                    if (!entry.isDir) continue;
                    const p = entry.path.replace(/\/$/, '');
                    if (!treeData['/']) treeData['/'] = [];
                    treeData['/'].push(entry);
                }
                if (treeData['/']) {
                    treeData['/'].sort((a, b) => a.name.localeCompare(b.name));
                }
                renderTree();
            } catch { /* tree loading is best-effort */ }
        }

        async function loadTreeLevel(dirPath) {
            const normalizedPath = dirPath.replace(/\/$/, '');
            if (treeData[normalizedPath] && treeData[normalizedPath].length > 0) return;
            try {
                const json = await invoke('list_directory', { url: serverUrl, token: authToken, path: normalizedPath || '/', depth: '1' });
                const entries = JSON.parse(json);
                const dirs = entries.filter(e => e.isDir);
                dirs.sort((a, b) => a.name.localeCompare(b.name));
                treeData[normalizedPath] = dirs;
                renderTree();
            } catch { /* lazy load is best-effort */ }
        }

        function goBack() {
            if (historyIndex > 0) { historyIndex--; navigate(pathHistory[historyIndex], false); }
        }

        function goForward() {
            if (historyIndex < pathHistory.length - 1) { historyIndex++; navigate(pathHistory[historyIndex], false); }
        }

        function goUp() {
            if (currentPath !== '/') navigate(parentPath(currentPath));
        }

        function goHome() { navigate('/'); }

        /* === Rendering === */
        function updateToolbar() {
            $id('btn-back').disabled = historyIndex <= 0;
            $id('btn-forward').disabled = historyIndex >= pathHistory.length - 1;
            $id('btn-up').disabled = currentPath === '/';
            renderBreadcrumbs();
        }

        function renderBreadcrumbs() {
            const parts = currentPath.split('/').filter(Boolean);
            let html = '';
            html += `<span class="breadcrumb ${parts.length === 0 ? 'active' : ''}" data-path="/">/</span>`;
            let accumulated = '';
            for (let i = 0; i < parts.length; i++) {
                accumulated += '/' + parts[i];
                const isLast = i === parts.length - 1;
                html += `<span class="breadcrumb-sep">/</span>`;
                html += `<span class="breadcrumb ${isLast ? 'active' : ''}" data-path="${escapeHtml(accumulated)}">${escapeHtml(parts[i])}</span>`;
            }
            breadcrumbs.innerHTML = html;
        }

        function renderFileList() {
            if (currentEntries.length === 0) {
                fileList.innerHTML = `<div class="empty-state">${ICO.empty}<span>This folder is empty</span></div>`;
                return;
            }
            const sorted = [...currentEntries].sort((a, b) => {
                if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
                return a.name.localeCompare(b.name);
            });
            fileList.innerHTML = sorted.map(entry => `
                <div class="file-entry" data-path="${escapeHtml(entry.path)}" data-is-dir="${entry.isDir}" data-name="${escapeHtml(entry.name)}">
                    <span class="file-icon">${entry.isDir ? ICO.folder : ICO.file}</span>
                    <span class="file-name">${escapeHtml(entry.name)}</span>
                    <span class="file-size">${entry.isDir ? '--' : formatSize(entry.size)}</span>
                    <span class="file-modified">${formatDate(entry.modified)}</span>
                </div>
            `).join('');
        }

        function renderSidebar() {
            renderTree();
        }

        function renderTree() {
            treeEl.innerHTML = renderTreeLevel('/', 0);
        }

        function renderTreeLevel(parentPath, level) {
            const children = treeData[parentPath] || [];
            let html = '';
            for (const child of children) {
                const hasChildren = (treeData[child.path.replace(/\/$/, '')] || []).length > 0;
                const isExpanded = expandedPaths.has(child.path.replace(/\/$/, ''));
                const isActive = currentPath === child.path.replace(/\/$/, '') || currentPath.startsWith(child.path.replace(/\/$/, '') + '/');
                const pl = level * 16 + 8;

                html += `<div class="tree-item ${isActive ? 'active' : ''}" data-path="${escapeHtml(child.path.replace(/\/$/, ''))}" style="padding-left:${pl}px">`;
                html += `<span class="tree-toggle">${hasChildren ? (isExpanded ? ICO.chevronD : ICO.chevronR) : ''}</span>`;
                html += `<span class="tree-icon">${ICO.folder}</span>`;
                html += `<span class="tree-label">${escapeHtml(child.name)}</span>`;
                html += `</div>`;

                if (hasChildren && isExpanded) {
                    html += renderTreeLevel(child.path.replace(/\/$/, ''), level + 1);
                }
            }
            return html;
        }

        function updateStatus() {
            const dirs = currentEntries.filter(e => e.isDir).length;
            const files = currentEntries.filter(e => !e.isDir).length;
            const totalSize = currentEntries.reduce((s, e) => s + e.size, 0);
            const parts = [];
            if (dirs > 0) parts.push(`${dirs} folder${dirs > 1 ? 's' : ''}`);
            if (files > 0) parts.push(`${files} file${files > 1 ? 's' : ''}`);
            $id('status-items').textContent = parts.join(', ') || 'Empty';
            $id('status-size').textContent = totalSize > 0 ? formatSize(totalSize) + ' total' : '';
            $id('status-path').textContent = currentPath;
        }

        function selectEntry(entryEl) {
            document.querySelectorAll('.file-entry.selected').forEach(e => e.classList.remove('selected'));
            if (entryEl) {
                entryEl.classList.add('selected');
                selectedEntry = {
                    path: entryEl.dataset.path,
                    isDir: entryEl.dataset.isDir === 'true',
                    name: entryEl.dataset.name,
                };
            } else {
                selectedEntry = null;
            }
        }

        /* === File Operations === */
        async function uploadFiles() {
            try {
                const { open } = window.__TAURI__.dialog;
                const { readFile } = window.__TAURI__.fs;
                const selected = await open({ multiple: true, directory: false });
                if (!selected) return;
                const paths = Array.isArray(selected) ? selected : [selected];
                for (const fp of paths) {
                    const data = await readFile(fp);
                    const fileName = fp.split(/[/\\]/).pop();
                    const destPath = joinPath(currentPath, fileName);
                    await invoke('put_file', { url: serverUrl, token: authToken, path: destPath, data: Array.from(data) });
                }
                await loadDirectory();
                await loadTree();
            } catch (err) {
                showError(String(err));
            }
        }

        async function uploadDroppedFiles(fileList) {
            for (const file of fileList) {
                try {
                    const buffer = await file.arrayBuffer();
                    const data = Array.from(new Uint8Array(buffer));
                    const destPath = joinPath(currentPath, file.name);
                    await invoke('put_file', { url: serverUrl, token: authToken, path: destPath, data });
                } catch (err) {
                    showError(`Failed to upload ${file.name}: ${err}`);
                    return;
                }
            }
            await loadDirectory();
            await loadTree();
        }

        async function downloadFile(entry) {
            try {
                const { save } = window.__TAURI__.dialog;
                const { writeFile } = window.__TAURI__.fs;
                const filePath = await save({ defaultPath: entry.name });
                if (!filePath) return;
                const data = await invoke('get_file', { url: serverUrl, token: authToken, path: entry.path });
                await writeFile(filePath, new Uint8Array(data));
            } catch (err) {
                showError(`Download failed: ${err}`);
            }
        }

        function showNewFolderDialog() {
            mkdirInput.value = '';
            mkdirOverlay.classList.remove('hidden');
            mkdirInput.focus();
        }

        async function createFolder(name) {
            if (!name) return;
            try {
                const destPath = joinPath(currentPath, name);
                await invoke('create_directory', { url: serverUrl, token: authToken, path: destPath });
                await loadDirectory();
                await loadTree();
            } catch (err) {
                showError(`Failed to create folder: ${err}`);
            }
        }

        function showRenameDialog(entry) {
            if (!entry) return;
            renameInput.value = entry.name;
            renameOverlay.classList.remove('hidden');
            renameInput.focus();
            renameInput.select();
        }

        async function renameItem(entry, newName) {
            if (!entry || !newName || newName === entry.name) return;
            try {
                const parent = parentPath(entry.path);
                const from = entry.path;
                const to = joinPath(parent, newName);
                await invoke('move_item', { url: serverUrl, token: authToken, from, to });
                await loadDirectory();
                await loadTree();
            } catch (err) {
                showError(`Rename failed: ${err}`);
            }
        }

        function showDeleteConfirm(entry) {
            if (!entry) return;
            const type = entry.isDir ? 'folder' : 'file';
            deleteMessage.textContent = `Are you sure you want to delete ${type} "${entry.name}"?`;
            deleteOverlay.classList.remove('hidden');
        }

        async function deleteItem(entry) {
            if (!entry) return;
            try {
                await invoke('delete_item', { url: serverUrl, token: authToken, path: entry.path });
                selectedEntry = null;
                await loadDirectory();
                await loadTree();
            } catch (err) {
                showError(`Delete failed: ${err}`);
            }
        }

        function showError(msg) {
            $id('status-connection').textContent = msg;
            setTimeout(() => updateConnectionStatus(true), 4000);
        }

        /* === Event Handlers === */

        /* Connect dialog */
        connectBtn.addEventListener('click', connect);
        connectToken.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
        connectUrl.addEventListener('keydown', e => { if (e.key === 'Enter') connectToken.focus(); });

        /* Toolbar buttons */
        $id('btn-back').addEventListener('click', goBack);
        $id('btn-forward').addEventListener('click', goForward);
        $id('btn-up').addEventListener('click', goUp);
        $id('btn-home').addEventListener('click', goHome);
        $id('btn-refresh').addEventListener('click', async () => { await loadDirectory(); await loadTree(); });
        $id('btn-upload').addEventListener('click', uploadFiles);
        $id('btn-mkdir').addEventListener('click', showNewFolderDialog);
        $id('btn-delete').addEventListener('click', () => { if (selectedEntry) showDeleteConfirm(selectedEntry); });
        $id('btn-disconnect').addEventListener('click', disconnect);

        /* Breadcrumbs */
        breadcrumbs.addEventListener('click', e => {
            const bc = e.target.closest('.breadcrumb');
            if (bc && bc.dataset.path) navigate(bc.dataset.path);
        });

        /* File list: click, double-click */
        fileList.addEventListener('click', e => {
            const entryEl = e.target.closest('.file-entry');
            selectEntry(entryEl || null);
        });

        fileList.addEventListener('dblclick', e => {
            const entryEl = e.target.closest('.file-entry');
            if (!entryEl) return;
            const entry = { path: entryEl.dataset.path, isDir: entryEl.dataset.isDir === 'true', name: entryEl.dataset.name };
            if (entry.isDir) {
                navigate(entry.path);
            } else {
                downloadFile(entry);
            }
        });

        /* File list: drag-and-drop */
        fileListContainer.addEventListener('dragover', e => { e.preventDefault(); fileListContainer.classList.add('drag-over'); });
        fileListContainer.addEventListener('dragleave', e => { if (!fileListContainer.contains(e.relatedTarget)) fileListContainer.classList.remove('drag-over'); });
        fileListContainer.addEventListener('drop', e => {
            e.preventDefault();
            fileListContainer.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) uploadDroppedFiles(e.dataTransfer.files);
        });

        /* Sidebar: tree item click */
        treeEl.addEventListener('click', e => {
            const item = e.target.closest('.tree-item');
            if (!item) return;
            const path = item.dataset.path;
            const p = path.replace(/\/$/, '');

            if (expandedPaths.has(p)) {
                expandedPaths.delete(p);
            } else {
                expandedPaths.add(p);
                loadTreeLevel(p);
            }
            navigate(p);
        });

        /* Context menu */
        fileList.addEventListener('contextmenu', e => {
            e.preventDefault();
            const entryEl = e.target.closest('.file-entry');
            if (entryEl) {
                selectEntry(entryEl);
                contextTarget = { path: entryEl.dataset.path, isDir: entryEl.dataset.isDir === 'true', name: entryEl.dataset.name };
                showContextMenu(e.clientX, e.clientY, true);
            } else {
                contextTarget = null;
                showContextMenu(e.clientX, e.clientY, false);
            }
        });

        document.addEventListener('click', () => contextMenu.classList.add('hidden'));

        contextMenu.addEventListener('click', e => {
            const item = e.target.closest('.context-item');
            if (!item || !contextTarget) return;
            const action = item.dataset.action;
            if (action === 'open') {
                if (contextTarget.isDir) navigate(contextTarget.path);
                else downloadFile(contextTarget);
            } else if (action === 'download') {
                downloadFile(contextTarget);
            } else if (action === 'rename') {
                showRenameDialog(contextTarget);
            } else if (action === 'delete') {
                showDeleteConfirm(contextTarget);
            } else if (action === 'favorite') {
                if (contextTarget) addFavorite(contextTarget.path, contextTarget.name);
            }
            contextMenu.classList.add('hidden');
        });

        function showContextMenu(x, y, hasTarget) {
            const items = contextMenu.querySelectorAll('.context-item');
            items[0].style.display = hasTarget ? '' : 'none'; /* Open */
            items[1].style.display = (hasTarget && !contextTarget?.isDir) ? '' : 'none'; /* Download */
            items[2].style.display = ''; /* separator handled by layout */
            items[3].style.display = hasTarget ? '' : 'none'; /* Rename */
            /* Delete is always visible but only works with a target */

            contextMenu.classList.remove('hidden');
            /* Adjust position to stay within viewport */
            const rect = contextMenu.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 4;
            if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 4;
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
        }

        /* Keyboard shortcuts */
        document.addEventListener('keydown', e => {
            /* Don't handle if a dialog input is focused */
            if (e.target.tagName === 'INPUT') return;

            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (e.key === 'Backspace' && !selectedEntry) { goUp(); return; }
                if (selectedEntry) { e.preventDefault(); showDeleteConfirm(selectedEntry); }
            }
            if (e.key === 'F2' && selectedEntry) { e.preventDefault(); showRenameDialog(selectedEntry); }
            if (e.key === 'Enter' && selectedEntry) {
                e.preventDefault();
                if (selectedEntry.isDir) navigate(selectedEntry.path);
                else downloadFile(selectedEntry);
            }
            if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                document.querySelectorAll('.file-entry').forEach(el => el.classList.add('selected'));
            }
        });

        /* Rename dialog */
        $id('rename-cancel').addEventListener('click', () => renameOverlay.classList.add('hidden'));
        $id('rename-ok').addEventListener('click', () => {
            if (selectedEntry) renameItem(selectedEntry, renameInput.value.trim());
            renameOverlay.classList.add('hidden');
        });
        renameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') { $id('rename-ok').click(); }
            if (e.key === 'Escape') { renameOverlay.classList.add('hidden'); }
        });

        /* New folder dialog */
        $id('mkdir-cancel').addEventListener('click', () => mkdirOverlay.classList.add('hidden'));
        $id('mkdir-ok').addEventListener('click', () => {
            createFolder(mkdirInput.value.trim());
            mkdirOverlay.classList.add('hidden');
        });
        mkdirInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') { $id('mkdir-ok').click(); }
            if (e.key === 'Escape') { mkdirOverlay.classList.add('hidden'); }
        });

        /* Delete dialog */
        $id('delete-cancel').addEventListener('click', () => deleteOverlay.classList.add('hidden'));
        $id('delete-ok').addEventListener('click', () => {
            if (selectedEntry) deleteItem(selectedEntry);
            deleteOverlay.classList.add('hidden');
        });

        /* Close overlays on backdrop click */
        [renameOverlay, mkdirOverlay, deleteOverlay].forEach(overlay => {
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.add('hidden'); });
        });

        /* === Debug Logger === */
        const debugLog = [];
        const MAX_DEBUG_ENTRIES = 200;
        function debugLog_add(level, msg) {
            const ts = new Date().toISOString().slice(11, 23);
            const entry = { ts, level, msg };
            debugLog.push(entry);
            if (debugLog.length > MAX_DEBUG_ENTRIES) debugLog.shift();
            const el = document.getElementById('debug-log-content');
            if (el) {
                const line = document.createElement('div');
                line.className = 'debug-line debug-' + level;
                line.textContent = `[${ts}] ${level.toUpperCase()}: ${msg}`;
                el.appendChild(line);
                el.scrollTop = el.scrollHeight;
            }
        }

        /* Wrap invoke for debug logging */
        async function debugInvoke(cmd, args) {
            debugLog_add('info', `invoke('${cmd}'${args ? ', ' + JSON.stringify(Object.keys(args)) : ''})`);
            const t0 = performance.now();
            try {
                const result = await invoke(cmd, args);
                const dt = (performance.now() - t0).toFixed(1);
                debugLog_add('info', `${cmd} OK (${dt}ms)`);
                return result;
            } catch (err) {
                const dt = (performance.now() - t0).toFixed(1);
                debugLog_add('error', `${cmd} FAILED (${dt}ms): ${err}`);
                throw err;
            }
        }

        /* Replace raw invoke with debug wrapper in connect/navigation paths */
        async function connectWithDebug() {
            const url = connectUrl.value.trim().replace(/\/+$/, '');
            const token = connectToken.value.trim();
            if (!url) { connectError.textContent = 'Server URL is required'; return; }
            connectBtn.disabled = true;
            connectBtn.textContent = 'Connecting...';
            connectError.textContent = '';
            try {
                const info = await debugInvoke('test_connection', { url, token });
                serverUrl = url;
                authToken = token;
                localStorage.setItem('ferro_connection', JSON.stringify({ url: serverUrl, token: authToken }));
                connectOverlay.classList.add('hidden');
                mainEl.classList.remove('hidden');
                await navigate('/');
                await loadTree();
                updateConnectionStatus(true, info.serverName);
                debugLog_add('info', `Connected to ${url}`);
            } catch (err) {
                connectError.textContent = String(err);
                debugLog_add('error', `Connect failed: ${err}`);
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect';
            }
        }

        /* === Init === */
        async function init() {
            debugLog_add('info', 'Ferro Desktop init starting');
            let autoConnected = false;

            // Priority 1: CLI args (auto-connect, skip form)
            try {
                debugLog_add('info', 'Calling get_cli_connection...');
                const cli = await invoke('get_cli_connection');
                debugLog_add('info', `CLI response: serverUrl=${cli.serverUrl}, authToken=${cli.authToken ? '***' : '(none)'}`);
                if (cli && cli.serverUrl) {
                    debugLog_add('info', `CLI auto-connect to ${cli.serverUrl}`);
                    connectUrl.value = cli.serverUrl || '';
                    connectToken.value = cli.authToken || '';
                    const info = await debugInvoke('test_connection', { url: cli.serverUrl, token: cli.authToken || '' });
                    serverUrl = cli.serverUrl;
                    authToken = cli.authToken || '';
                    localStorage.setItem('ferro_connection', JSON.stringify({ url: serverUrl, token: authToken }));
                    connectOverlay.classList.add('hidden');
                    mainEl.classList.remove('hidden');
                    await navigate('/');
                    await loadTree();
                    updateConnectionStatus(true, info.serverName);
                    autoConnected = true;
                    debugLog_add('info', 'CLI auto-connect succeeded');
                } else {
                    debugLog_add('info', 'No CLI server URL provided, showing connect form');
                }
            } catch (err) {
                debugLog_add('error', `CLI auto-connect failed: ${err}`);
                // Show debug panel on failure so errors are visible
                document.getElementById('debug-panel').classList.remove('hidden');
                connectError.textContent = `Auto-connect failed: ${err}`;
            }

            // Priority 2: saved localStorage (validate connection before navigating)
            if (!autoConnected) {
                const saved = localStorage.getItem('ferro_connection');
                if (saved) {
                    try {
                        const conn = JSON.parse(saved);
                        if (conn.url) {
                            debugLog_add('info', `Validating saved connection to ${conn.url}`);
                            connectUrl.value = conn.url || '';
                            connectToken.value = conn.token || '';
                            try {
                                const info = await debugInvoke('test_connection', { url: conn.url, token: conn.token || '' });
                                serverUrl = conn.url;
                                authToken = conn.token || '';
                                mainEl.classList.remove('hidden');
                                connectOverlay.classList.add('hidden');
                                await navigate('/');
                                await loadTree();
                                updateConnectionStatus(true, info.serverName);
                                autoConnected = true;
                                debugLog_add('info', 'Restored saved connection successfully');
                            } catch (e) {
                                debugLog_add('warn', `Saved connection invalid: ${e}`);
                                localStorage.removeItem('ferro_connection');
                            }
                        }
                    } catch { /* ignore parse errors */ }
                }
            }

            // Override connect button to use debug wrapper
            connectBtn.removeEventListener('click', connect);
            connectBtn.addEventListener('click', connectWithDebug);

            // Debug panel controls
            const debugPanel = $id('debug-panel');
            $id('debug-close').addEventListener('click', () => debugPanel.classList.add('hidden'));
            $id('debug-clear').addEventListener('click', () => {
                const el = $id('debug-log-content');
                el.innerHTML = '';
                debugLog.length = 0;
            });
            $id('debug-copy').addEventListener('click', () => {
                const text = debugLog.map(e => `[${e.ts}] ${e.level.toUpperCase()}: ${e.msg}`).join('\n');
                navigator.clipboard.writeText(text);
            });

            // Toggle debug panel: Ctrl+Shift+D or F12
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey && e.shiftKey && e.key === 'D') || e.key === 'F12') {
                    e.preventDefault();
                    debugPanel.classList.toggle('hidden');
                }
            });

            debugLog_add('info', 'Init complete');
            debugLog_add('info', 'Press Ctrl+Shift+D to toggle debug log');
        }

        document.addEventListener('DOMContentLoaded', init);

        /* === Mobile Detection === */
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;
        if (isMobile) {
            document.body.classList.add('mobile');
        }
        window.addEventListener('resize', () => {
            document.body.classList.toggle('mobile', window.innerWidth < 768);
        });

        /* === Hamburger Menu === */
        const hamburgerBtn = $id('btn-hamburger');
        const sidebar = $id('sidebar');
        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }
        sidebar.addEventListener('click', e => {
            if (window.innerWidth < 768 && e.target.closest('.tree-item')) {
                sidebar.classList.remove('open');
            }
        });
        document.addEventListener('click', e => {
            if (window.innerWidth < 768 && !e.target.closest('.sidebar') && !e.target.closest('.hamburger')) {
                sidebar.classList.remove('open');
            }
        });

        /* === Mobile Navigation === */
        const mobileNav = $id('mobileNav');
        const viewPanels = ['settings-view', 'recent-view', 'favorites-view'];
        const fileListView = $id('file-list-container');

        function showView(viewName) {
            viewPanels.forEach(id => $id(id).classList.add('hidden'));
            if (viewName === 'files') {
                fileListView.classList.remove('hidden');
            } else {
                fileListView.classList.add('hidden');
                const panel = $id(viewName + '-view');
                if (panel) {
                    panel.classList.remove('hidden');
                    if (viewName === 'settings') loadSettings();
                    if (viewName === 'recent') loadRecentFiles();
                    if (viewName === 'favorites') loadFavorites();
                }
            }
        }

        if (mobileNav) {
            mobileNav.addEventListener('click', e => {
                const btn = e.target.closest('.nav-btn');
                if (!btn) return;
                mobileNav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                showView(view);
            });
        }

        /* === Settings View === */
        async function loadSettings() {
            try {
                const config = await invoke('cmd_get_config');
                $id('settings-server-url').value = config.serverUrl || '';
                $id('settings-mount-point').value = config.mountPoint || '';
                $id('settings-sync-interval').value = config.syncIntervalSecs || 0;
                updateSyncIntervalLabel(config.syncIntervalSecs || 0);
            } catch { /* best effort */ }
            $id('settings-auth-token').value = authToken || '';
            const savedTheme = localStorage.getItem('ferro_theme') || 'system';
            $id('settings-theme').value = savedTheme;
        }

        function updateSyncIntervalLabel(val) {
            const label = $id('settings-sync-interval-label');
            if (val == 0) label.textContent = '0 (disabled)';
            else label.textContent = val + ' seconds';
        }

        $id('settings-sync-interval').addEventListener('input', e => {
            updateSyncIntervalLabel(e.target.value);
        });

        $id('settings-save').addEventListener('click', async () => {
            try {
                await invoke('cmd_save_config', {
                    request: {
                        serverUrl: $id('settings-server-url').value || undefined,
                        mountPoint: $id('settings-mount-point').value || undefined,
                        syncIntervalSecs: parseInt($id('settings-sync-interval').value) || 0,
                    }
                });
                localStorage.setItem('ferro_theme', $id('settings-theme').value);
                applyTheme($id('settings-theme').value);
                showError('Settings saved');
            } catch (err) {
                showError('Save failed: ' + err);
            }
        });

        $id('settings-disconnect').addEventListener('click', disconnect);

        $id('settings-theme').addEventListener('change', e => {
            applyTheme(e.target.value);
        });

        function applyTheme(theme) {
            const root = document.documentElement;
            root.removeAttribute('data-theme');
            if (theme === 'light') root.setAttribute('data-theme', 'light');
            else if (theme === 'dark') root.setAttribute('data-theme', 'dark');
        }

        /* === Recent Files View === */
        async function loadRecentFiles() {
            const container = $id('recent-file-list');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const json = await invoke('list_directory', { url: serverUrl, token: authToken, path: '/', depth: '1' });
                const entries = JSON.parse(json);
                const files = entries
                    .filter(e => !e.isDir)
                    .sort((a, b) => {
                        const da = new Date(a.modified || 0);
                        const db = new Date(b.modified || 0);
                        return db - da;
                    })
                    .slice(0, 50);
                if (files.length === 0) {
                    container.innerHTML = '<div class="empty-state">No recent files</div>';
                    return;
                }
                container.innerHTML = files.map(f => `
                    <div class="file-entry" data-path="${escapeHtml(f.path)}" data-is-dir="false" data-name="${escapeHtml(f.name)}">
                        <span class="file-icon">${ICO.file}</span>
                        <span class="file-name">${escapeHtml(f.name)}</span>
                        <span class="file-size">${formatSize(f.size)}</span>
                        <span class="file-modified">${formatDate(f.modified)}</span>
                    </div>
                `).join('');
                container.querySelectorAll('.file-entry').forEach(el => {
                    el.addEventListener('click', () => {
                        const parentDir = parentPath(el.dataset.path);
                        mobileNav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        mobileNav.querySelector('[data-view="files"]').classList.add('active');
                        showView('files');
                        navigate(parentDir);
                    });
                });
            } catch {
                container.innerHTML = '<div class="empty-state">Failed to load recent files</div>';
            }
        }

        /* === Favorites View === */
        function getFavorites() {
            try { return JSON.parse(localStorage.getItem('ferro_favorites') || '[]'); }
            catch { return []; }
        }

        function saveFavorites(favs) {
            localStorage.setItem('ferro_favorites', JSON.stringify(favs));
        }

        function addFavorite(path, name) {
            const favs = getFavorites();
            if (!favs.find(f => f.path === path)) {
                favs.push({ path, name });
                saveFavorites(favs);
            }
        }

        function removeFavorite(path) {
            const favs = getFavorites().filter(f => f.path !== path);
            saveFavorites(favs);
            loadFavorites();
        }

        function loadFavorites() {
            const container = $id('favorites-list');
            const favs = getFavorites();
            if (favs.length === 0) {
                container.innerHTML = '<div class="empty-state">No favorites yet. Right-click files to add favorites.</div>';
                return;
            }
            container.innerHTML = favs.map(f => `
                <div class="file-entry" data-path="${escapeHtml(f.path)}" data-name="${escapeHtml(f.name)}">
                    <span class="file-icon">${ICO.folder}</span>
                    <span class="file-name">${escapeHtml(f.name)}</span>
                    <span class="fav-remove" data-path="${escapeHtml(f.path)}">Remove</span>
                </div>
            `).join('');
            container.querySelectorAll('.file-entry').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.classList.contains('fav-remove')) {
                        removeFavorite(e.target.dataset.path);
                        return;
                    }
                    const parentDir = parentPath(el.dataset.path);
                    mobileNav.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    mobileNav.querySelector('[data-view="files"]').classList.add('active');
                    showView('files');
                    navigate(parentDir);
                });
            });
        }

        /* === Touch: Long-press for Context Menu === */
        let longPressTimer = null;
        let longPressTarget = null;
        const LONG_PRESS_DURATION = 500;

        fileList.addEventListener('touchstart', e => {
            const entryEl = e.target.closest('.file-entry');
            if (!entryEl) return;
            longPressTarget = entryEl;
            longPressTimer = setTimeout(() => {
                const touch = e.touches[0];
                selectEntry(entryEl);
                contextTarget = {
                    path: entryEl.dataset.path,
                    isDir: entryEl.dataset.isDir === 'true',
                    name: entryEl.dataset.name,
                };
                showContextMenu(touch.clientX, touch.clientY, true);
                longPressTarget = null;
            }, LONG_PRESS_DURATION);
        }, { passive: true });

        fileList.addEventListener('touchmove', () => {
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        }, { passive: true });

        fileList.addEventListener('touchend', () => {
            if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        }, { passive: true });

        /* === Touch: Swipe to Reveal Actions === */
        let swipeStartX = 0;
        let swipeStartY = 0;
        let swipeEntry = null;
        let swipeCurrentX = 0;
        const SWIPE_THRESHOLD = 80;

        fileList.addEventListener('touchstart', e => {
            const entryEl = e.target.closest('.file-entry');
            if (!entryEl) return;
            const touch = e.touches[0];
            swipeStartX = touch.clientX;
            swipeStartY = touch.clientY;
            swipeEntry = entryEl;
            swipeCurrentX = 0;
            entryEl.style.transition = '';
        }, { passive: true });

        fileList.addEventListener('touchmove', e => {
            if (!swipeEntry) return;
            const touch = e.touches[0];
            const dx = touch.clientX - swipeStartX;
            const dy = touch.clientY - swipeStartY;
            if (Math.abs(dy) > Math.abs(dx)) { swipeEntry = null; return; }
            if (dx < 0) {
                swipeCurrentX = Math.max(dx, -160);
                swipeEntry.style.transform = `translateX(${swipeCurrentX}px)`;
            }
        }, { passive: true });

        fileList.addEventListener('touchend', e => {
            if (!swipeEntry) return;
            swipeEntry.style.transition = 'transform 0.2s ease';
            const entry = {
                path: swipeEntry.dataset.path,
                isDir: swipeEntry.dataset.isDir === 'true',
                name: swipeEntry.dataset.name,
            };
            if (swipeCurrentX < -SWIPE_THRESHOLD) {
                if (confirm(`Delete "${entry.name}"?`)) {
                    deleteItem(entry);
                }
            }
            swipeEntry.style.transform = '';
            swipeEntry = null;
            swipeCurrentX = 0;
        }, { passive: true });

        /* === Touch: Pull-to-Refresh === */
        let pullStartY = 0;
        let isPulling = false;
        const PULL_THRESHOLD = 60;

        fileListContainer.addEventListener('touchstart', e => {
            if (fileList.scrollTop === 0) {
                pullStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }, { passive: true });

        fileListContainer.addEventListener('touchmove', e => {
            if (!isPulling) return;
            const dy = e.touches[0].clientY - pullStartY;
            if (dy > 0 && fileList.scrollTop === 0) {
                fileList.style.overflow = 'hidden';
            }
        }, { passive: true });

        fileListContainer.addEventListener('touchend', async e => {
            if (!isPulling) return;
            const dy = e.changedTouches[0].clientY - pullStartY;
            isPulling = false;
            fileList.style.overflow = '';
            if (dy > PULL_THRESHOLD && serverUrl) {
                await loadDirectory();
                await loadTree();
            }
        }, { passive: true });

        /* === Touch: Tap-to-Select, Tap Destination === */
        let tapTimer = null;
        let tapCount = 0;
        let tapTarget = null;

        fileList.addEventListener('touchend', e => {
            const entryEl = e.target.closest('.file-entry');
            if (!entryEl || longPressTarget) return;

            if (tapTarget === entryEl) {
                tapCount++;
            } else {
                tapCount = 1;
                tapTarget = entryEl;
            }

            if (tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => {
                if (tapCount === 1) {
                    selectEntry(entryEl);
                } else if (tapCount >= 2) {
                    const entry = {
                        path: entryEl.dataset.path,
                        isDir: entryEl.dataset.isDir === 'true',
                        name: entryEl.dataset.name,
                    };
                    if (entry.isDir) {
                        navigate(entry.path);
                    } else {
                        downloadFile(entry);
                    }
                }
                tapCount = 0;
                tapTarget = null;
            }, 300);
        }, { passive: true });
    </script>
