[package]
name = "ferro-desktop"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[[bin]]
name = "ferro-desktop"
path = "src/main.rs"

[features]
tauri = ["dep:tauri"]

[dependencies]
ferro-common = { package = "ferro-common", path = "../common" }
tauri = { version = "2", features = ["devtools"], optional = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4"] }
anyhow = "1"

# [build-dependencies]
# tauri-build = { version = "1", features = [] }
# Uncomment when tauri-cli is installed:
#   1. cargo add tauri --features dev
#   2. Uncomment this build-dependency
#   3. Create build.rs with: fn main() { tauri_build::build() }
