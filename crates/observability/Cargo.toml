[package]
name = "ferro-observability"
version = "0.1.0"
edition.workspace = true
description = "Observability endpoints for Ferro (Prometheus, VictoriaMetrics, Loki, VictoriaLogs)"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
rust-version = "1.85"

[dependencies]
axum = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"

[features]
default = ["endpoints"]
endpoints = ["axum"]
loki = []
victoriametrics = []

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
