[package]
name = "ferro-sync-protocol"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Bidirectional sync protocol for cross-node and cross-PC synchronization"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
ferro-common = { path = "../common" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "macros", "rt", "net", "io-util"] }
async-trait = "0.1"
dashmap = "6"
uuid = { version = "1", features = ["v4", "serde"] }
sha2 = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
rusqlite = { workspace = true }
tracing = "0.1"
notify = "7"
bytes = { workspace = true }
hex = "0.4"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "test-util"] }
tempfile = "3"
