[package]
name = "ferro-server-security-middleware"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Security middleware for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[features]
default = []
webauthn = ["ferro-server-security/webauthn"]

[dependencies]
ferro-common = { path = "../common" }
ferro-auth = { path = "../auth" }
ferro-server-security = { path = "../server-security" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip"] }
hyper = { version = "1", features = ["http1", "http2"] }
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
uuid = { version = "1", features = ["v4"] }
jsonwebtoken = "9"
utoipa = { version = "5", features = ["axum_extras"] }

[dev-dependencies]
bytes = "1"
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }
