[package]
name = "web"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ferro-common = { path = "../common" }
leptos = { workspace = true }
leptos_meta = { version = "0.6" }
leptos_router = { version = "0.6" }
serde = { workspace = true }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlElement", "HtmlInputElement", "HtmlAnchorElement", "Element", "Event", "EventTarget", "MouseEvent", "KeyboardEvent", "DragEvent", "DataTransfer", "File", "FileList", "Blob", "Url", "Storage", "Headers", "Request", "RequestInit", "Response", "console", "Location", "Navigator", "Clipboard", "MediaQueryList", "MediaQueryListEvent"] }
chrono = { version = "0.4", features = ["serde"] }
console_error_panic_hook = "0.1"
uuid = { version = "1", features = ["v4", "js"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
