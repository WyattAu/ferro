[package]
name = "web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Web frontend for Ferro"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ferro-common = { path = "../common" }
ferro-crdt = { path = "../crdt", features = ["wasm"] }
leptos = { workspace = true }
leptos_meta = { version = "0.6" }
leptos_router = { version = "0.6", features = ["csr"] }
serde = { workspace = true }
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["Window", "Document", "HtmlElement", "HtmlInputElement", "HtmlAnchorElement", "Element", "Event", "EventTarget", "MouseEvent", "KeyboardEvent", "DragEvent", "DataTransfer", "File", "FileList", "Blob", "Url", "Storage", "Headers", "Request", "RequestInit", "Response", "console", "Location", "Navigator", "Clipboard", "MediaQueryList", "MediaQueryListEvent", "IntersectionObserver", "IntersectionObserverEntry", "IntersectionObserverInit", "HtmlLinkElement", "HtmlStyleElement", "HtmlHeadElement", "Node", "WebSocket", "MessageEvent"] }
chrono = { version = "0.4", features = ["serde"] }
console_error_panic_hook = "0.1"
uuid = { version = "1", features = ["v4", "js"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
tokio = { workspace = true }
