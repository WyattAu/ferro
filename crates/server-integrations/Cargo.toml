[package]
name = "ferro-server-integrations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Ferro server integrations: mail, push notifications, offline API, and remote mounts"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common", features = ["db"] }
ferro-circuit-breaker = { path = "../circuit-breaker" }
ferro-offline = { path = "../offline" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
rusqlite = { version = "0.32", features = ["bundled"] }
dashmap = "6"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
base64 = "0.22"
sha2 = "0.11"
native-tls = "0.2"
imap = "2.4"
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls", "builder", "tokio1", "aws-lc-rs", "webpki-roots"] }
http-body-util = "0.1"
utoipa = { version = "5", features = ["axum_extras"] }
bytes = "1"
rand = "0.9"
ferro-server-security-middleware = { path = "../server-security-middleware" }
zeroize = { workspace = true, features = ["derive"] }
tokio-util = { version = "0.7", features = ["rt"] }

[dev-dependencies]
tokio = { workspace = true }
tempfile = "3"
