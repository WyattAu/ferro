[package]
name = "ferro-server-storage-ops"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Storage operations (upload, download, quota, dedup, batch, thumbnails, snapshots, health) for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-core = { path = "../core", features = ["sqlite", "search"] }
ferro-server-security = { path = "../server-security" }
ferro-server-security-middleware = { path = "../server-security-middleware" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
bytes = "1"
uuid = { version = "1", features = ["v4"] }
tokio-util = { version = "0.7", features = ["io", "rt"] }
sha2 = "0.11"
hex = "0.4"
tempfile = "3"
utoipa = { version = "5", features = ["axum_extras"] }
chrono = { version = "0.4", features = ["serde"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "webp"] }
pdf = "0.9"
dashmap = "6"
lru = "0.16"
