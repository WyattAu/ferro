[package]
name = "ferro-server-webdav-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "WebDAV core operations (PROPFIND, MKCOL, MOVE, COPY, locks, trash) for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-core = { path = "../core" }
ferro-dav = { path = "../dav", features = ["handlers"] }
ferro-offline = { path = "../offline" }
ferro-server-compliance = { path = "../server-compliance" }
ferro-server-security = { path = "../server-security" }
ferro-server-security-middleware = { path = "../server-security-middleware" }
ferro-server-storage-ops = { path = "../server-storage-ops" }
ferro-server-versioning = { path = "../server-versioning" }
ferro-webdav-handler = { path = "../webdav-handler" }
axum = { workspace = true }
async-trait = "0.1"
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
rusqlite = { version = "0.32", features = ["bundled"] }
bytes = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
quick-xml = { version = "0.41", features = ["serialize"] }
http-body-util = "0.1"
tokio-util = { version = "0.7", features = ["io", "rt"] }
dashmap = "6"
url = "2"
futures = "0.3"
