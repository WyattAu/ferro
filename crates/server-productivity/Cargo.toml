[package]
name = "ferro-server-productivity"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Productivity modules (tasks, notes, calendar, contacts, whiteboard) for the Ferro server"
license.workspace = true
repository = "https://github.com/WyattAu/ferro"
publish = false

[dependencies]
common = { package = "ferro-common", path = "../common" }
ferro-dav = { path = "../dav" }
axum = { workspace = true }
serde = { workspace = true }
serde_json = "1"
tokio = { workspace = true }
tracing = "0.1"
rusqlite = { version = "0.32", features = ["bundled"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
