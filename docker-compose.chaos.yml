version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ferro
      POSTGRES_USER: ferro
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  ferro-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://ferro:test@postgres/ferro
      REDIS_URL: redis://redis:6379
      STORAGE_URL: http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres_data:
