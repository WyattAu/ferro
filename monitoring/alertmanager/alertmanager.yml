global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'ferro@example.com'
  smtp_auth_username: 'ferro@example.com'
  smtp_auth_password: 'password'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://localhost:5001/'
    email_configs:
      - to: 'admin@example.com'
        subject: 'Ferro Alert: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          {{ end }}