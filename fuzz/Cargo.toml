[package]
name = "ferro-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
ferro-webdav-handler = { path = "../crates/webdav-handler" }
ferro-dav = { path = "../crates/dav" }
ferro-common = { path = "../crates/common" }
ferro-server = { path = "../crates/server" }
serde_json = "1"
quick-xml = { version = "0.41", features = ["serialize"] }
toml = "0.8"
ferro-server-fips = { path = "../crates/server-fips" }
ferro-circuit-breaker = { path = "../crates/circuit-breaker" }

[[bin]]
name = "fuzz_proppatch"
path = "fuzz_targets/fuzz_proppatch.rs"
test = false
doc = false

[[bin]]
name = "fuzz_lock_request"
path = "fuzz_targets/fuzz_lock_request.rs"
test = false
doc = false

[[bin]]
name = "fuzz_escape_xml"
path = "fuzz_targets/fuzz_escape_xml.rs"
test = false
doc = false

[[bin]]
name = "fuzz_wasm_magic"
path = "fuzz_targets/fuzz_wasm_magic.rs"
test = false
doc = false

[[bin]]
name = "fuzz_calcardav"
path = "fuzz_targets/fuzz_calcardav.rs"
test = false
doc = false

[[bin]]
name = "fuzz_config"
path = "fuzz_targets/fuzz_config.rs"
test = false
doc = false

[[bin]]
