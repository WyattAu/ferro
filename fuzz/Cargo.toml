path = "fuzz_targets/fuzz_path_normalize.rs"
test = false
doc = false

[[bin]]
name = "fuzz_api_auth"
path = "fuzz_targets/fuzz_api_auth.rs"
test = false
doc = false

[[bin]]
name = "fuzz_xml"
path = "fuzz_targets/fuzz_xml.rs"
test = false
doc = false

[[bin]]
