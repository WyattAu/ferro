# Development docker-compose — for production, use deploy/docker-compose.yml
# See deploy/README.md for all deployment options
services:
  ferro:
    build: .
    volumes:
      - ferro-data:/data
    environment:
      - FERRO_DATA_DIR=/data
      - FERRO_STATIC_DIR=/app/ui
      - FERRO_ADMIN_USER=admin
      - FERRO_ADMIN_PASSWORD=changeme
      - FERRO_EXTERNAL_URL=http://localhost
      - RUST_LOG=info
    expose:
      - "8080"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--data-dir"
      - "/data"
      - "--static-dir"
      - "/app/ui"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/ferro"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=localhost
    depends_on:
      ferro:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ferro-data:
    driver: local
  caddy-data:
  caddy-config:
