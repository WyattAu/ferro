# Ferro reproducible build configuration
# Ensures deterministic builds across environments

[build]
# Use a consistent target directory
target-dir = "target"

[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "web_sys_unstable_apis"]

[env]
# Deterministic builds: disable incremental compilation for release
CARGO_INCREMENTAL = { value = "0", force = true }
# Fixed hash scheme for cargo
CARGO_HASH_FORMAT = "blake3"
