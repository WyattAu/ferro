[workspace]
members = [
    "crates/core",
    "crates/common",
    "crates/dav",
    "crates/server",
    "crates/web",
    "crates/desktop",
    "crates/cli",
    "crates/crypto",
    "crates/fuse",
    "crates/client",
    "crates/benchmarks",
    "crates/admin",
    "crates/observability",
    "crates/auth",
    "crates/webdav-handler",
    "crates/server-activitypub",
    "crates/server-webrtc",
]
resolver = "2"

[workspace.package]
version = "2.5.1"
license = "AGPL-3.0-or-later"
edition = "2024"
rust-version = "1.85"

[workspace.dependencies]
# Shared dependency versions across all crates
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
axum = "0.7"
leptos = { version = "0.6", features = ["csr"] } # Update version as needed

[profile.release]
strip = true
lto = true
codegen-units = 1
