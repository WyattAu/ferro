<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 -- Page Not Found -- Ferro</title>
    <meta name="description" content="The page you requested was not found.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>F</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #E85D04;
            --accent-dark: #D4520A;
            --accent-glow: rgba(232, 93, 4, 0.2);
            --crimson: #370617;
            --surface: #F5F0EB;
            --surface-alt: #EDE8E3;
            --surface-card: #FAFAF8;
            --text-primary: #2B2B2B;
            --text-secondary: #8B8178;
            --border: #D4CBC0;
            --border-strong: #2B2B2B;
            --font-display: "IBM Plex Mono", "JetBrains Mono", "SF Mono", monospace;
            --font-body: "Inter", "IBM Plex Sans", system-ui, sans-serif;
            --shadow-accent: 0 8px 30px rgba(232,93,4,0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-primary);
            background: var(--surface);
            background-image:
                radial-gradient(ellipse at 15% 50%, rgba(232,93,4,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(55,6,23,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(232,93,4,0.02) 0%, transparent 40%);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            text-decoration: none;
            z-index: 1000;
            border: 2px solid var(--accent);
            transition: top 0.2s;
        }
        .skip-link:focus { top: 0.5rem; }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: var(--accent-glow);
            top: -100px; right: -50px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph1 20s ease-in-out infinite;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: rgba(55, 6, 23, 0.06);
            bottom: 5%; left: -80px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph2 25s ease-in-out infinite;
        }

        @keyframes morph1 {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: translate(0, 0) rotate(0deg); }
            50% { border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%; transform: translate(-20px, 15px) rotate(3deg); }
        }
        @keyframes morph2 {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: translate(0, 0); }
            50% { border-radius: 40% 60% 60% 40% / 50% 50% 40% 60%; transform: translate(30px, -20px); }
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(245, 240, 235, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--border);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }
        nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-logo {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.25rem;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-logo span { color: var(--accent); }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.15s;
        }
        .nav-links a:hover { color: var(--text-primary); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 4rem 0;
        }

        .error-content {
            text-align: center;
            max-width: 540px;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 12vw, 9rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        .error-code .accent { color: var(--accent); }

        .error-title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .error-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            text-decoration: none;
            padding: 0.875rem 2rem;
            border: 2px solid transparent;
            transition: all 0.2s;
            min-height: 44px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
            box-shadow: var(--shadow-accent);
            transform: translateY(-1px);
        }

        .btn:focus-visible,
        .nav-links a:focus-visible,
        .nav-logo:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        footer {
            border-top: 2px solid var(--border-strong);
            padding: 3rem 0;
            position: relative;
            z-index: 1;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .footer-copy {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }
        .footer-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }
        .footer-links a {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer-links a:hover { color: var(--accent); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .blob-2 { animation: none !important; }
            * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <nav aria-label="Main navigation">
        <div class="container">
            <a href="/" class="nav-logo">ferro<span>.</span></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/ferro/docs/">Documentation</a></li>
                <li><a href="https://github.com/WyattAu/ferro" target="_blank" rel="noopener">Source</a></li>
            </ul>
        </div>
    </nav>

    <main id="main-content" role="main">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="container">
            <div class="error-content">
                <div class="error-code" aria-hidden="true">4<span class="accent">0</span>4</div>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-desc">
                    The page you requested does not exist or has been moved.
                    Check the URL or head back to the home page.
                </p>
                <a href="/" class="btn btn-primary">Return home</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-copy">AGPL-3.0-or-later -- Ferro</div>
                <ul class="footer-links">
                    <li><a href="/ferro/docs/">Documentation</a></li>
                    <li><a href="https://github.com/WyattAu/ferro" target="_blank" rel="noopener">GitHub</a></li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
