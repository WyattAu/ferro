services:
  ferro:
    image: ghcr.io/wyattau/ferro:latest
    ports: ["8080:8080"]
    volumes: ["ferro-data:/data"]
    environment:
      - FERRO_ADMIN_PASSWORD=admin
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2@sha256:e9d0a18363c9c3022aef6793a7e135000d11127fb0e18b89de08b1e21e629d60
    ports: ["3100:3100"]
    volumes: ["loki-data:/loki"]
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0@sha256:da1630c5102817ed365a523448c766e417030a53ec3dfbe064d429df504e023e
    ports: ["9090:9090"]
    volumes:
      - ./prometheus-loki.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2@sha256:83b35757385daafca6dbc2134715f932386331dcde02296609ab6123433552f0
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-provisioning:/etc/grafana/provisioning
    depends_on: [prometheus, loki]
    restart: unless-stopped

volumes:
  ferro-data:
  loki-data:
  prometheus-data:
  grafana-data:
