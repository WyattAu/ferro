global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warnings'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://ferro:8080/api/webhooks/alertmanager'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://ferro:8080/api/webhooks/alertmanager'
        send_resolved: true

  - name: 'warnings'
    webhook_configs:
      - url: 'http://ferro:8080/api/webhooks/alertmanager'
        send_resolved: true
