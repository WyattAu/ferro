apiVersion: v1
kind: Service
metadata:
  name: {{ include "ferro.fullname" . }}
  labels:
    {{- include "ferro.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    {{- include "ferro.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
