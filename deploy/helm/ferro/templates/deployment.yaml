apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ferro.fullname" . }}
  labels:
    {{- include "ferro.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ferro.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ferro.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ferro.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--host"
            - {{ .Values.ferro.host | quote }}
            - "--port"
            - {{ .Values.ferro.port | quote }}
            - "--admin-user"
            - {{ .Values.ferro.adminUser | quote }}
            - "--log-level"
            - {{ .Values.ferro.logLevel | quote }}
            - "--log-format"
            - {{ .Values.ferro.logFormat | quote }}
            - "--max-upload-bytes"
            - {{ .Values.ferro.maxUploadBytes | quote }}
            - "--max-file-versions"
            - {{ .Values.ferro.maxFileVersions | quote }}
            - "--rate-limit-rpm"
            - {{ .Values.ferro.rateLimitRpm | quote }}
            {{- if .Values.ferro.wasmEnabled }}
            - "--wasm-enabled"
            {{- end }}
            {{- if .Values.ferro.storage.dataDir }}
            - "--data-dir"
            - {{ .Values.ferro.storage.dataDir | quote }}
            {{- end }}
            {{- if .Values.ferro.storage.url }}
            - "--storage-url"
            - {{ .Values.ferro.storage.url | quote }}
            {{- end }}
            {{- if .Values.ferro.corsAllowedOrigins }}
            - "--cors-allowed-origins"
            - {{ .Values.ferro.corsAllowedOrigins | quote }}
            {{- end }}
            {{- if .Values.ferro.federationSecret }}
            - "--federation-secret"
            - {{ .Values.ferro.federationSecret | quote }}
            {{- end }}
            {{- if .Values.ferro.metadataDb }}
            - "--metadata-db"
            - {{ .Values.ferro.metadataDb | quote }}
            {{- end }}
          env:
            - name: FERRO_ADMIN_PASSWORD
              value: {{ .Values.ferro.adminPassword | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ferro.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.ferro.storage.dataDir }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ferro.fullname" . }}
        {{- else }}
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
