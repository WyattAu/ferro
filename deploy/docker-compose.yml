services:
  ferro:
    image: ghcr.io/wyattau/ferro:latest
    container_name: ferro
    restart: unless-stopped
    ports:
      - "${FERRO_PORT:-8080}:8080"
    volumes:
      - ferro-data:/data
    environment:
      FERRO_DATA_DIR: /data
      FERRO_HOST: 0.0.0.0
      FERRO_PORT: 8080
      FERRO_LOG_FORMAT: json
      FERRO_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ferro-data:
    driver: local
