apiVersion: v1
kind: ConfigMap
metadata:
  name: ferro-config
  namespace: ferro
  labels:
    app.kubernetes.io/name: ferro
    app.kubernetes.io/part-of: ferro
data:
  FERRO_HOST: "0.0.0.0"
  FERRO_PORT: "8080"
  FERRO_LOG_LEVEL: "info"
  FERRO_DATA_DIR: "/data"
  FERRO_STATIC_DIR: "/app/ui"
  # WARNING: Restrict CORS origins in production
  FERRO_CORS_ALLOWED_ORIGINS: "*"
  FERRO_GRACEFUL_SHUTDOWN_TIMEOUT: "30"
  RUST_LOG: "info"
