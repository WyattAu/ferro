apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ferro-allow-dns
  namespace: ferro
  labels:
    app.kubernetes.io/name: ferro
    app.kubernetes.io/part-of: ferro
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ferro
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
