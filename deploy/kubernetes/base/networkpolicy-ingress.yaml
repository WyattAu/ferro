apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ferro-allow-ingress
  namespace: ferro
  labels:
    app.kubernetes.io/name: ferro
    app.kubernetes.io/part-of: ferro
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ferro
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
