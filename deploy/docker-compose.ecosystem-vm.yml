version: '3.8'

services:
  ferro-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ferro-server
    ports: ["8080:8080"]
    volumes:
      - ferro-data:/data
    environment:
      - FERRO_ADMIN_USER=admin
      - FERRO_ADMIN_PASSWORD=${FERRO_ADMIN_PASSWORD:-changeme}
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/ferro"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ferro-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: ferro-web
    ports: ["80:80"]
    depends_on:
      ferro-server:
        condition: service_healthy
    environment:
      - FERRO_SERVER_URL=http://ferro-server:8080
    restart: unless-stopped

  ferro-admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    container_name: ferro-admin
    ports: ["8081:80"]
    depends_on:
      ferro-server:
        condition: service_healthy
    environment:
      - FERRO_SERVER_URL=http://ferro-server:8080
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoriametrics:latest
    container_name: ferro-victoria-metrics
    ports: ["8428:8428"]
    volumes: ["vm-data:/victoria-metrics-data"]
    command:
      - --promscrape.config=/etc/promscrape.yml
      - --promscrape.configStrictParse=false
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victorialogs:latest
    container_name: ferro-victoria-logs
    ports: ["9428:9428"]
    volumes:
      - vl-data:/victoria-logs-data
    command:
      - --storageDataPath=/victoria-logs-data
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: ferro-vmagent
    volumes:
      - ./prometheus-ecosystem.yml:/etc/prometheus/prometheus.yml
    command:
      - --promscrape.config=/etc/prometheus/prometheus.yml
      - --remoteWrite.url=http://victoria-metrics:8428/api/v1/write
    depends_on: [victoria-metrics]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ferro-grafana
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on: [victoria-metrics, victoria-logs, ferro-server]
    restart: unless-stopped

volumes:
  ferro-data:
  vm-data:
  vl-data:
  grafana-data:
