services:
  ferro-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ferro-server
    ports: ["8080:8080"]
    volumes:
      - ferro-data:/data
    environment:
      - FERRO_ADMIN_USER=admin
      - FERRO_ADMIN_PASSWORD=${FERRO_ADMIN_PASSWORD:-changeme}
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/ferro"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ferro-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: ferro-web
    ports: ["80:80"]
    depends_on:
      ferro-server:
        condition: service_healthy
    environment:
      - FERRO_SERVER_URL=http://ferro-server:8080
    restart: unless-stopped

  ferro-admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    container_name: ferro-admin
    ports: ["8081:80"]
    depends_on:
      ferro-server:
        condition: service_healthy
    environment:
      - FERRO_SERVER_URL=http://ferro-server:8080
    restart: unless-stopped

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.108.0@sha256:948ded8229fb5a36f317dfd119a9186162e01bdd41fa66d92a987a82d8d4a0e8
    container_name: ferro-victoria-metrics
    ports: ["8428:8428"]
    volumes: ["vm-data:/victoria-metrics-data"]
    command:
      - --promscrape.config=/etc/promscrape.yml
      - --promscrape.configStrictParse=false
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0@sha256:ae9bea8d8a3b0fc47c7f0058bcca410e79c84b4a0acd12d4dac71b9302526590
    container_name: ferro-victoria-logs
    ports: ["9428:9428"]
    volumes:
      - vl-data:/victoria-logs-data
    command:
      - --storageDataPath=/victoria-logs-data
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:v1.108.0@sha256:be3e5a670354f05f5ba95876a9c41d680747268658a4ba90c75e46581c64e7d4
    container_name: ferro-vmagent
    volumes:
      - ./prometheus-ecosystem.yml:/etc/prometheus/prometheus.yml
    command:
      - --promscrape.config=/etc/prometheus/prometheus.yml
      - --remoteWrite.url=http://victoria-metrics:8428/api/v1/write
    depends_on: [victoria-metrics]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2@sha256:83b35757385daafca6dbc2134715f932386331dcde02296609ab6123433552f0
    container_name: ferro-grafana
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on: [victoria-metrics, victoria-logs, ferro-server]
    restart: unless-stopped

volumes:
  ferro-data:
  vm-data:
  vl-data:
  grafana-data:
