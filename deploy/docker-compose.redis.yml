services:
  redis:
    image: redis:7-alpine
    container_name: ferro-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ferro:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      FERRO_REDIS_URL: redis://redis:6379

volumes:
  redis-data:
