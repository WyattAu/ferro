# Cargo-deny configuration for Ferro
# https://embarkstudios.github.io/cargo-deny/
# Uses version = 2 for both advisories and licenses.

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Active advisories in dependency tree as of 2026-05-12:
    # bincode unmaintained -- transitive via fuse3 (FUSE-only, no server impact)
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained -- transitive via fuse3 (FUSE-only)" },
    # paste unmaintained -- transitive via leptos (web frontend only)
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained -- transitive via leptos (web frontend)" },
    # proc-macro-error unmaintained -- transitive via leptos (web frontend only)
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained -- transitive via leptos (web frontend)" },
    # WASI path_open(TRUNCATE) bypasses FilePerms::WRITE -- transitive via wasmtime (WASM sandbox feature)
    # Ferro only exposes sandboxed WASM workers with restricted capabilities; TRUNCATE is not user-accessible
    { id = "RUSTSEC-2026-0149", reason = "WASI truncate bypass in wasmtime -- Ferro WASM workers use restricted capabilities, truncate not exposed" },
    # wasmtime 18.x has multiple security advisories -- upgrade to wasmtime 43+ tracked as TD-028
    # WASM host is an optional feature; production deployments use x86_64 with restricted capabilities
    { id = "RUSTSEC-2020-0168", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2024-0384", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2024-0438", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2025-0046", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2025-0057", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2025-0118", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0020", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0021", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0085", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0086", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0087", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0088", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0089", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0091", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0092", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0093", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0094", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0095", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
    { id = "RUSTSEC-2026-0096", reason = "wasmtime 18.x -- upgrade to 43+ tracked as TD-028" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "0BSD",
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "tag"

# === UPSTREAM BLOCKERS ===
# bincode (RUSTSEC-2025-0141): unmaintained transitive via fuse3.
#   FUSE-only, no server impact. Monitor fuse3 upstream for replacement.
#
# paste (RUSTSEC-2024-0436): unmaintained transitive via leptos.
#   Web frontend only. Monitor leptos for migration to paste2 or alternative.
#
# proc-macro-error (RUSTSEC-2024-0370): unmaintained transitive via leptos.
#   Web frontend only. Monitor leptos for migration to proc-macro-error2.
