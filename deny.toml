# Cargo-deny configuration for Ferro
# https://embarkstudios.github.io/cargo-deny/
# Uses version = 2 for both advisories and licenses.

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Unmaintained transitive dependencies with limited blast radius:
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained -- transitive via fuse3 (FUSE-only, no server impact)" },
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained -- transitive via leptos (web frontend only)" },
    { id = "RUSTSEC-2024-0384", reason = "instant unmaintained -- transitive via reed-solomon-erasure (distributed crate only)" },
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 unmaintained -- transitive via leptos (web frontend only)" },
    { id = "RUSTSEC-2026-0204", reason = "transitive dep -- limited scope, no server impact" },
    { id = "RUSTSEC-2025-0119", reason = "transitive dep -- limited scope, no server impact" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "0BSD",
    "OpenSSL",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "tag"
