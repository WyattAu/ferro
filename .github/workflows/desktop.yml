name: Desktop (All Platforms)

on:
  push:
    branches: [main]
    paths:
      - 'crates/desktop/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/desktop/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Fetch dependencies
        run: cargo fetch --locked --target x86_64-pc-windows-msvc

      - name: Build desktop crate (release)
        run: cargo build --locked --release -p ferro-desktop --target x86_64-pc-windows-msvc --features tauri

      - name: Build NSIS installer
        run: cargo tauri build --target x86_64-pc-windows-msvc --features tauri --bundles nsis
        working-directory: crates/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-windows-release
          path: target/x86_64-pc-windows-msvc/release/ferro-desktop.exe
          retention-days: 7

      - name: Upload NSIS installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-windows-installer
          path: crates/desktop/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ---------------------------------------------------------------------------
  # macOS (Universal Binary)
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Build for aarch64
        run: cargo build --locked --release -p ferro-desktop --target aarch64-apple-darwin --features tauri

      - name: Build for x86_64
        run: cargo build --locked --release -p ferro-desktop --target x86_64-apple-darwin --features tauri

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/ferro-desktop \
            target/x86_64-apple-darwin/release/ferro-desktop \
            -output target/universal-apple-darwin/ferro-desktop
        working-directory: ${{ github.workspace }}

      - name: Build DMG
        run: cargo tauri build --features tauri --bundles dmg
        working-directory: crates/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-macos
          path: crates/desktop/target/release/bundle/dmg/*.dmg
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Linux (deb, rpm, AppImage)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (deb + rpm + AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev dpkg fakeroot rpm

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Build desktop crate (release)
        run: cargo build --locked --release -p ferro-desktop --features tauri

      - name: Build Tauri bundles
        run: cargo tauri build --features tauri --bundles deb,rpm,appimage
        working-directory: crates/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload deb package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-linux-deb
          path: crates/desktop/target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload rpm package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-linux-rpm
          path: crates/desktop/target/release/bundle/rpm/*.rpm
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-linux-appimage
          path: crates/desktop/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Android (APK)
  # ---------------------------------------------------------------------------
  build-android:
    name: Android APK (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Verify target installed
        run: rustup target add aarch64-linux-android

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@fc7031f7ea55dc1e51e1e804f7d3e2257c4f0b0e # v3

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Fetch dependencies
        run: cargo fetch --locked --target aarch64-linux-android

      - name: Build Android APK
        run: cargo tauri android build --target aarch64-linux-android --features android
        working-directory: crates/desktop
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload Android APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-android-apk
          path: crates/desktop/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Lint (all platforms)
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Clippy desktop crate
        run: cargo clippy -p ferro-desktop --features tauri --locked -- -D warnings

  clippy-android:
    name: Clippy (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Clippy desktop crate (Android)
        run: cargo clippy -p ferro-desktop --features android --locked -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Run desktop tests
        run: cargo test --locked -p ferro-desktop

  # ---------------------------------------------------------------------------
  # Linux standalone packaging script
  # ---------------------------------------------------------------------------
  package-linux-script:
    name: Linux Package Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev dpkg fakeroot

      - name: Run package script
        run: bash scripts/package-linux.sh --skip-frontend
        env:
          VERSION: "3.0.0"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-linux-packages
          path: dist/linux/*
          retention-days: 30
