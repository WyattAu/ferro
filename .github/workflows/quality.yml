name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Check for unused dependencies
        run: cargo machete

  semver-checks:
    name: API Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Check API compatibility
        run: cargo semver-checks check-release --workspace 2>&1 || true

  miri:
    name: UB Detection (Miri)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Run Miri on client FFI
        run: cargo +nightly miri test -p ferro-client 2>&1 || true
      - name: Run Miri on mount-nfs
        run: cargo +nightly miri test -p ferro-mount-nfs 2>&1 || true

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@950ad79c889908398568694a48e45c1e328e8c22 # v2.3.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nextest:
    name: Test (nextest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Install nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ~/.cargo/bin
      - name: Run tests with nextest
        run: cargo nextest run --workspace --locked --features "s3,gcs,azure,pg,redis,ldap" || cargo test --workspace --locked --features "s3,gcs,azure,pg,redis,ldap"

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets (10s each)
        run: |
          for target in $(cargo fuzz list 2>/dev/null); do
            echo "Fuzzing $target..."
            timeout 15 cargo fuzz run "$target" -- -max_total_time=10 2>&1 | tail -3 || true
          done

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation testing on critical crates
        run: |
          cargo mutants --check -p ferro-common --no-shuffle 2>&1 | tail -10 || true
          cargo mutants --check -p ferro-auth --no-shuffle 2>&1 | tail -10 || true
          cargo mutants --check -p ferro-server-webdav-core --no-shuffle 2>&1 | tail -10 || true
