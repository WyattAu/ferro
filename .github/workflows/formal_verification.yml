name: Formal Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: formal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lean:
    name: Lean4 Proofs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      # NOTE: curl-pipe-sh is a supply-chain risk. Pinning elan to a specific
      # release mitigates this; consider replacing with a dedicated setup-lean
      # action when one becomes available.
      - name: Install Lean4
        run: |
          ELAN_VERSION="4.0.0"
          curl --fail -L "https://github.com/leanprover/elan/releases/download/v${ELAN_VERSION}/elan-x86_64-unknown-linux-gnu.tar.gz" -o elan.tar.gz
          tar -xzf elan.tar.gz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build formal proofs
        run: |
          cd formal
          lake build
