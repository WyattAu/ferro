name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ferro-server
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ferro-server
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ferro-server
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin ferro-server --bin ferro-cli
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ferro-*

  create-release:
    name: Create Release
    needs: [build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ferro-server-*/ferro-*
