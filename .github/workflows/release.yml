name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify CI Passes on Main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check CI status on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/commits/main/check-runs --jq '.check_runs | (length > 0) and all(.status == "completed" and .conclusion == "success")')
          if [ "$STATUS" != "true" ]; then
            echo "ERROR: CI checks on main are not all passing. Aborting release."
            gh api repos/${{ github.repository }}/commits/main/check-runs --jq '.check_runs[] | "\(.name): \(.status) \(.conclusion)"'
            exit 1
          fi
          echo "All CI checks on main are passing. Proceeding with release."

  build:
    needs: verify
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ferro-server
            binary: ferro-server
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ferro-server-musl
            binary: ferro-server
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ferro-server-aarch64
            binary: ferro-server
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ferro-server-macos
            binary: ferro-server
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ferro-server-macos-arm
            binary: ferro-server
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ferro-server.exe
            binary: ferro-server.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install deps (x86_64 linux)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev musl-tools
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
      - name: Install deps (aarch64 cross-compile)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev gcc-aarch64-linux-gnu libc6-dev-arm64-cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
      - name: Set aarch64 linker
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
        if: matrix.target == 'aarch64-unknown-linux-gnu'
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked --target ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release -p ferro-server --target ${{ matrix.target }} --features "s3,gcs,azure"
      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          timeout 15 "$BINARY" --host 127.0.0.1 --port 9876 --data-dir /tmp/ferro-smoke 2>/dev/null &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            sleep 1
            if curl -sf http://127.0.0.1:9876/healthz > /dev/null 2>&1; then
              echo "Smoke test PASSED: /healthz returned 200 after ${i}s"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
          done
          echo "Smoke test FAILED: /healthz did not return 200 within 10s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
      - name: Cleanup smoke test server
        if: always() && runner.os != 'Windows'
        run: kill $(pgrep -f "ferro-server.*9876") 2>/dev/null || true
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7
      - name: Generate SBOM
        run: cargo cyclonedx --all --format json --output-pattern crate
      - name: Collect SBOM files
        run: |
          mkdir -p sbom-output
          find . -name "*.cdx.json" -exec cp {} sbom-output/ \;
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom-output/

  release:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: artifacts/**/*
          generate_release_notes: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@53851d14592bedcffcf25ea515637cff71ef929a # v3.3.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: BUILD_FEATURES=s3,gcs,azure
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
