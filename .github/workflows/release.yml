name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ferro-server
            binary: ferro-server
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ferro-server-musl
            binary: ferro-server
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ferro-server-aarch64
            binary: ferro-server
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ferro-server-macos
            binary: ferro-server
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ferro-server-macos-arm
            binary: ferro-server
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ferro-server.exe
            binary: ferro-server.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install deps (x86_64 linux)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev musl-tools
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-unknown-linux-musl'
      - name: Install deps (aarch64 cross-compile)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev gcc-aarch64-linux-gnu libc6-dev-arm64-cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
      - name: Build
        run: cargo build --release -p ferro-server --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
