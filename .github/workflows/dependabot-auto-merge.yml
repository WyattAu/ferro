name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7 # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve patch updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          steps.metadata.outputs.package-ecosystem == 'cargo'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI checks
        if: steps.metadata.outputs.dependency-type == 'direct:production'
        run: |
          echo "Waiting for CI checks to pass..."
          # Wait up to 10 minutes for required checks
          for i in $(seq 1 60); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs --jq '.check_runs[] | select(.name == "test") | .status')
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs --jq '.check_runs[] | select(.name == "test") | .conclusion')
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI checks passed"
                exit 0
              else
                echo "CI checks failed: $CONCLUSION"
                exit 1
              fi
            fi
            echo "Waiting... ($i/60)"
            sleep 10
          done
          echo "Timeout waiting for CI checks"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          steps.metadata.outputs.package-ecosystem == 'cargo'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve dev-dependency updates
        if: |
          (contains(steps.metadata.outputs.dependency-names, 'proptest') ||
          contains(steps.metadata.outputs.dependency-names, 'criterion') ||
          contains(steps.metadata.outputs.dependency-names, 'tempfile') ||
          contains(steps.metadata.outputs.dependency-names, 'tokio-test')) &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
