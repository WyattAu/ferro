name: Sanitizers

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: sanitizers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  address-sanitizer:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: sanitizers-addr
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --component rust-src
          rustup default nightly
      - name: Install ASan
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - name: Run ASan on core crates
        run: |
          RUSTFLAGS="-Z sanitizer=address" \
          RUSTDOCFLAGS="-Z sanitizer=address" \
          cargo test -Zbuild-std --target x86_64-unknown-linux-gnu \
            -p ferro-common \
            -p ferro-core \
            -p ferro-auth \
            -p ferro-dav \
            -p ferro-circuit-breaker
        env:
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1

  thread-sanitizer:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: sanitizers-thread
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --component rust-src
          rustup default nightly
      - name: Install TSan
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - name: Run TSan on async crates
        run: |
          RUSTFLAGS="-Z sanitizer=thread" \
          RUSTDOCFLAGS="-Z sanitizer=thread" \
          cargo test -Zbuild-std --target x86_64-unknown-linux-gnu \
            -p ferro-server \
            -p ferro-server-collaboration \
            -p ferro-server-infra
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

  miri:
    name: MIRI Memory Safety
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: sanitizers-miri
      - name: Install Rust nightly with MIRI
        run: |
          rustup toolchain install nightly --component miri
          rustup default nightly
      - name: Run MIRI on unsafe crates
        run: |
          cargo +nightly miri test -p ferro-client -- -Zmiri-disable-isolation
          cargo +nightly miri test -p ferro-health -- -Zmiri-disable-isolation
          cargo +nightly miri test -p ferro-mount-nfs -- -Zmiri-disable-isolation
          cargo +nightly miri test -p ferro-fuse -- -Zmiri-disable-isolation
          cargo +nightly miri test -p ferro-server -- -Zmiri-disable-isolation
          cargo +nightly miri test -p ferro-desktop -- -Zmiri-disable-isolation
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
