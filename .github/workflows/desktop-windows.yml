name: Desktop Windows Build

on:
  push:
    branches: [main]
    paths:
      - 'crates/desktop/**'
      - '.github/workflows/desktop-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/desktop/**'
      - '.github/workflows/desktop-windows.yml'
  workflow_dispatch:

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Windows Desktop (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Verify target installed
        run: rustup target add x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Fetch dependencies
        run: cargo fetch --locked --target x86_64-pc-windows-msvc

      - name: Build desktop crate (debug)
        run: cargo build --locked -p ferro-desktop --target x86_64-pc-windows-msvc --features tauri

      - name: Build desktop crate (release)
        run: cargo build --locked --release -p ferro-desktop --target x86_64-pc-windows-msvc --features tauri

      - name: Build NSIS installer
        run: cargo tauri build --target x86_64-pc-windows-msvc --features tauri --bundles nsis
        working-directory: crates/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload debug binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-windows-debug
          path: target/x86_64-pc-windows-msvc/debug/ferro-desktop.exe
          retention-days: 7

      - name: Upload release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-windows-release
          path: target/x86_64-pc-windows-msvc/release/ferro-desktop.exe
          retention-days: 7

      - name: Upload NSIS installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-windows-installer
          path: crates/desktop/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-windows-arm64:
    name: Windows Desktop (aarch64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Verify target installed
        run: rustup target add aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Fetch dependencies
        run: cargo fetch --locked --target aarch64-pc-windows-msvc

      - name: Build desktop crate (release)
        run: cargo build --locked --release -p ferro-desktop --target aarch64-pc-windows-msvc --features tauri

      - name: Upload release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferro-desktop-windows-arm64
          path: target/aarch64-pc-windows-msvc/release/ferro-desktop.exe
          retention-days: 7

  clippy-windows:
    name: Clippy (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Clippy desktop crate
        run: cargo clippy -p ferro-desktop --features tauri --locked -- -D warnings

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - name: Run desktop tests
        run: cargo test --locked -p ferro-desktop
