name: Extended Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: extended-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build Docker image
        run: docker build -t ferro:e2e .
      - name: Start server from Docker image
        run: |
          docker run -d --name ferro-e2e \
            -p 8080:8080 \
            ferro:e2e \
            --cors-allowed-origins "*" \
            --static-dir /app/ui
          # Wait for server to be ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/.well-known/ferro > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          if ! curl -sf http://localhost:8080/.well-known/ferro > /dev/null 2>&1; then
            echo "ERROR: Server did not become ready after 120s"
            docker logs ferro-e2e || true
            exit 1
          fi
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
      - name: Install Playwright
        run: npm ci && npx playwright install --with-deps
        working-directory: e2e
      - name: Run E2E tests
        run: npx playwright test
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
      - name: Server logs
        if: always()
        run: docker logs ferro-e2e || true
      - name: Cleanup
        if: always()
        run: docker rm -f ferro-e2e || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferro
          POSTGRES_PASSWORD: ferro
          POSTGRES_DB: ferro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ferro:ferro@localhost:5432/ferro_test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked --version 0.8.7
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - run: cargo llvm-cov --workspace --features "s3,gcs,azure,pg,redis,ldap" --locked --fail-under-lines 80 --lcov --output-path lcov.info
      - uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          files: lcov.info
          fail_ci_if_error: false
          min_coverage: 80
