name: Extended Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ferro:e2e .
      - name: Start server from Docker image
        run: |
          docker run -d --name ferro-e2e \
            -p 8080:8080 \
            ferro:e2e \
            --cors-allowed-origins "*" \
            --static-dir /app/ui
          # Wait for server to be ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/.well-known/ferro > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: npm install && npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run E2E tests
        run: npx playwright test
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
      - name: Server logs
        if: always()
        run: docker logs ferro-e2e || true
      - name: Cleanup
        if: always()
        run: docker rm -f ferro-e2e || true

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferro
          POSTGRES_PASSWORD: ferro
          POSTGRES_DB: ferro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ferro:ferro@localhost:5432/ferro_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: Fetch dependencies
        run: cargo fetch --locked
      - run: cargo llvm-cov --workspace --features "s3,gcs,azure,pg,redis,ldap" --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
