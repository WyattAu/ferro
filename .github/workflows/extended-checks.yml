name: Extended Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build server
        run: cargo build --bin ferro-server
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: npm install && npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run E2E tests (server + playwright in same shell)
        run: |
          # Start server in background
          ./target/debug/ferro-server --data-dir /tmp/ferro-test --admin-user test --admin-password test --port 8080 --cors-allowed-origins "http://localhost:8080" > /tmp/ferro-server.log 2>&1 &
          SERVER_PID=$!

          # Cleanup function
          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          # Wait for server
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/.well-known/ferro > /dev/null 2>&1; then
              echo "Server ready (PID $SERVER_PID)"
              break
            fi
            sleep 2
          done

          # Verify server is alive
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Server crashed on startup:"
            cat /tmp/ferro-server.log
            exit 1
          fi

          # Run tests
          cd e2e && npx playwright test
          TEST_EXIT=$?

          # Show server logs on failure
          if [ $TEST_EXIT -ne 0 ]; then
            echo "=== Server logs ==="
            cat /tmp/ferro-server.log
          fi

          exit $TEST_EXIT
        env:
          BASE_URL: http://localhost:8080

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferro
          POSTGRES_PASSWORD: ferro
          POSTGRES_DB: ferro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ferro:ferro@localhost:5432/ferro_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - run: cargo llvm-cov --workspace --features "s3,gcs,azure,pg,redis,ldap" --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
