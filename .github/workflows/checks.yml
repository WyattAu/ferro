name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - run: cargo clippy --all-targets --features "s3,gcs,azure,pg,redis,ldap" -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferro
          POSTGRES_PASSWORD: ferro
          POSTGRES_DB: ferro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ferro:ferro@localhost:5432/ferro_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all

  test-cloud:
    name: Cloud (${{ matrix.feature }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature: [s3, gcs, azure]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --features ${{ matrix.feature }}

  test-pg:
    name: PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferro
          POSTGRES_PASSWORD: ferro
          POSTGRES_DB: ferro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ferro:ferro@localhost:5432/ferro_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --features pg

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny unmaintained --deny unsound --deny rustsec

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin ferro-server --bin ferro-cli
      - uses: actions/upload-artifact@v4
        with:
          name: ferro-server-linux
          path: target/release/ferro-server

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - run: cargo install trunk --locked
      - run: cd crates/web && trunk build --release
      - run: cargo build --package ferro-admin --target wasm32-unknown-unknown

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ferro:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --package ferro-benchmarks -- --output-format bencher | tee benchmark-results.txt
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
        retention-days: 90

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ferro-server-linux
      - run: |
          chmod +x ferro-server
          ./ferro-server --data-dir /tmp/ferro-test --admin-user admin --admin-password test --port 8888 &
      - run: for i in $(seq 1 30); do curl -sf http://localhost:8888/healthz && break; sleep 1; done
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install && npx playwright install --with-deps chromium && npx playwright test
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8888

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferro
          POSTGRES_PASSWORD: ferro
          POSTGRES_DB: ferro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ferro:ferro@localhost:5432/ferro_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - run: cargo llvm-cov --workspace --features "s3,gcs,azure,pg,redis,ldap" --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
