# Ferro Stable Deployment (non-canary alternative)
# Use when canary is not needed (e.g., hotfix, infrastructure changes)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferro-server
  namespace: ferro
  labels:
    app: ferro-server
    app.kubernetes.io/name: ferro
    app.kubernetes.io/component: server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ferro-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ferro-server
    spec:
      serviceAccountName: ferro-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: ferro-server
          image: ghcr.io/wyattau/ferro:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ferro-data
